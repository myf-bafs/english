<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能記帳本 - GLM-4V 專版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; }
        body { background-color: #f8fafc; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">AI 智能記帳</h1>
            <p class="text-gray-500 mt-2 font-medium">使用 GLM-4V-Flash 視覺模型</p>
        </header>

        <!-- 總額卡片 -->
        <div class="glass-card p-6 mb-6 bg-gradient-to-br from-indigo-600 to-purple-700 text-white shadow-xl border-none">
            <p class="text-indigo-100 text-xs font-bold uppercase tracking-wider">本月總支出</p>
            <h2 id="totalAmount" class="text-4xl font-black mt-1">$ 0</h2>
        </div>

        <!-- 操作區 -->
        <div class="glass-card p-6 mb-8">
            <div class="space-y-4">
                <input type="file" id="receiptInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('receiptInput').click()" 
                        class="w-full py-6 px-4 bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                    <span class="font-bold text-lg">拍攝或選擇單據</span>
                </button>

                <div id="loadingArea" class="hidden flex items-center justify-center gap-3 p-5 bg-indigo-50 rounded-xl text-indigo-700 animate-pulse">
                    <div class="loading-spinner"></div>
                    <span class="font-bold text-sm">GLM-4V 正在識別...</span>
                </div>

                <div id="resultPreview" class="hidden p-5 bg-white rounded-xl border-2 border-indigo-100 shadow-inner space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase">商店</label>
                            <input type="text" id="tempStore" class="w-full bg-transparent border-b-2 border-gray-100 focus:border-indigo-500 outline-none py-1 font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase">金額</label>
                            <input type="number" id="tempAmount" class="w-full bg-transparent border-b-2 border-gray-100 focus:border-indigo-500 outline-none py-1 font-bold">
                        </div>
                    </div>
                    <button id="saveBtn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-all shadow-lg">確認儲存</button>
                </div>
            </div>
        </div>

        <!-- 歷史 -->
        <div id="historyList" class="space-y-3 pb-10"></div>
    </div>

    <script>
        // --- 重要：請確認您的 API 金鑰 ---
        const apiKey = "272f193352024ce99416a7128bc499f6.QADLgmGclBxYOWYr";
        
        // 智譜 AI GLM-4V 的 OpenAI 兼容端點
        const modelEndpoint = "https://open.bigmodel.cn/api/paas/v4/chat/completions";
        
        let records = JSON.parse(localStorage.getItem('expenseRecords') || '[]');
        renderRecords();

        document.getElementById('receiptInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loadingArea').classList.remove('hidden');
            document.getElementById('resultPreview').classList.add('hidden');

            try {
                const base64Data = await compressImage(file);
                const rawBase64 = base64Data.split(',')[1];
                
                const result = await fetchGLM4V(rawBase64);
                
                if (result) {
                    document.getElementById('tempStore').value = result.store;
                    document.getElementById('tempAmount').value = result.amount;
                    document.getElementById('resultPreview').classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert("辨識失敗: " + error.message);
            } finally {
                document.getElementById('loadingArea').classList.add('hidden');
            }
        });

        async function fetchGLM4V(base64Image) {
            const payload = {
                model: "glm-4v-flash", // 確保使用正確的模型代碼
                messages: [
                    {
                        role: "user",
                        content: [
                            { type: "text", text: "請辨識這張圖片中的『商店名稱』與『結帳總金額』。請直接以 JSON 格式回傳：{\"store\": \"名稱\", \"amount\": 數字}，不要回傳任何其他說明文字。" },
                            { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
                        ]
                    }
                ],
                temperature: 0.1
            };

            const response = await fetch(modelEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "網路錯誤");
            }

            const data = await response.json();
            let content = data.choices[0].message.content;
            
            // 清理 JSON
            content = content.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(content);
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSide = 1200;
                        let w = img.width, h = img.height;
                        if (w > h && w > maxSide) { h *= maxSide / w; w = maxSide; }
                        else if (h > maxSide) { w *= maxSide / h; h = maxSide; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

        document.getElementById('saveBtn').onclick = () => {
            const store = document.getElementById('tempStore').value;
            const amount = parseFloat(document.getElementById('tempAmount').value);
            if (!store || isNaN(amount)) return;
            records.unshift({ id: Date.now(), store, amount, date: new Date().toLocaleString() });
            localStorage.setItem('expenseRecords', JSON.stringify(records));
            renderRecords();
            document.getElementById('resultPreview').classList.add('hidden');
        };

        function renderRecords() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            let total = 0;
            records.forEach(r => {
                total += r.amount;
                const div = document.createElement('div');
                div.className = 'glass-card p-4 flex justify-between items-center';
                div.innerHTML = `<div><p class="font-bold">${r.store}</p><p class="text-xs text-gray-400">${r.date}</p></div><span class="font-black text-indigo-600">$${r.amount}</span>`;
                list.appendChild(div);
            });
            document.getElementById('totalAmount').innerText = `$ ${total.toLocaleString()}`;
        }
    </script>
</body>
</html>
