<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Smart Finance - 廣東話語音記帳</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI 記帳">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .currency-tag {
            font-size: 0.65rem;
            padding: 1px 4px;
            border-radius: 4px;
            background: #e2e8f0;
            color: #475569;
            margin-left: 4px;
        }

        .recording {
            animation: pulse 1.5s infinite;
            color: #ef4444 !important;
            background-color: #fee2e2 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-baseline gap-2">
                <h1 id="pageTitle" class="text-2xl font-bold text-slate-800">儀表板</h1>
                <span class="text-xs text-blue-500 font-bold bg-blue-50 px-2 py-0.5 rounded-full">v2.2</span>
            </div>
            <div class="hidden md:flex gap-4">
                <button onclick="switchTab('dashboard')" class="text-slate-500 hover:text-blue-600 font-medium px-3 py-1">首頁</button>
                <button onclick="switchTab('history')" class="text-slate-500 hover:text-blue-600 font-medium px-3 py-1">明細</button>
                <button onclick="switchTab('settings')" class="text-slate-500 hover:text-blue-600 font-medium px-3 py-1">設定</button>
            </div>
        </header>

        <!-- 1. 儀表板分頁 -->
        <div id="tab-dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl shadow-blue-200">
                    <p class="text-blue-100 text-sm opacity-80 uppercase tracking-wider">本月總支出 (HKD)</p>
                    <h3 class="text-4xl font-bold mt-2">$ <span id="totalAmount">0</span></h3>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm">今日花費 (HKD)</p>
                    <h3 class="text-3xl font-bold mt-2 text-slate-800">$ <span id="todayAmount">0</span></h3>
                </div>
            </div>

            <!-- AI 功能區 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 拍照辨識 -->
                <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-camera text-blue-500"></i> 拍照記帳
                    </h2>
                    <div class="border-2 border-dashed border-blue-100 bg-blue-50/50 rounded-2xl p-6 text-center cursor-pointer hover:border-blue-400 transition" onclick="document.getElementById('fileInput').click()">
                        <p class="text-sm text-blue-600 font-medium">拍攝收據提取商戶名</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                    </div>
                </div>

                <!-- 廣東話語音/文字辨識 -->
                <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i class="fa-solid fa-microphone text-purple-500"></i> 廣東話語音
                        </h2>
                        <button id="voiceBtn" onclick="toggleVoice()" class="w-10 h-10 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center transition">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                    <div class="flex flex-col gap-2">
                        <textarea id="quickText" placeholder="點擊右上方麥克風講話，或貼上銀行簡訊..." class="w-full h-20 p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-purple-400"></textarea>
                        <button onclick="handleTextAI()" class="bg-purple-600 text-white p-2 rounded-xl text-sm font-bold hover:bg-purple-700">AI 辨識內容</button>
                    </div>
                </div>
            </div>

            <div id="aiStatus" class="mt-4 text-sm text-center hidden">
                <span class="loader mr-2"></span> <span id="statusText" class="text-slate-600">AI 正在努力分析中...</span>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="font-bold text-slate-800">最近記錄</h2>
                    <button onclick="switchTab('history')" class="text-sm text-blue-600">查看全部</button>
                </div>
                <div id="recentList" class="divide-y divide-slate-100"></div>
            </div>
        </div>

        <!-- 2. 消費明細分頁 -->
        <div id="tab-history" class="tab-content space-y-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-xl font-bold text-slate-800">所有消費明細 (HKD)</h2>
                    <button onclick="clearData()" class="p-2 text-red-500 bg-red-50 rounded-lg hover:bg-red-100 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                <div id="expenseList" class="divide-y divide-slate-100 min-h-[400px]"></div>
            </div>

            <!-- 手動新增 -->
            <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4 text-slate-800">手動補錄</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <input type="text" id="manualMerchant" placeholder="店名/餐廳名" class="col-span-2 p-3 rounded-xl border border-slate-200 outline-none">
                    <input type="number" id="manualAmount" placeholder="金額" class="p-3 rounded-xl border border-slate-200 outline-none">
                    <select id="manualCurrency" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <option value="HKD">HKD</option>
                        <option value="TWD">TWD</option>
                        <option value="JPY">JPY</option>
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                    </select>
                    <select id="manualCategory" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <option value="食">餐飲</option>
                        <option value="衣">服飾</option>
                        <option value="住">居家</option>
                        <option value="行">交通</option>
                        <option value="育">教育</option>
                        <option value="樂">娛樂</option>
                        <option value="其他">其他</option>
                    </select>
                    <button onclick="addExpenseManually()" class="col-span-2 md:col-span-5 bg-blue-600 text-white p-3 rounded-xl font-bold">新增記錄</button>
                </div>
            </div>
        </div>

        <!-- 3. 設定分頁 -->
        <div id="tab-settings" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold mb-4">系統設定</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">ZhipuAI API Key</label>
                        <div class="flex gap-2">
                            <input type="password" id="apiKey" class="flex-1 p-3 rounded-xl border border-slate-200 outline-none">
                            <button onclick="saveConfig()" class="bg-slate-800 text-white px-6 py-3 rounded-xl">儲存</button>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-100">
                        <h3 class="font-bold text-slate-800 mb-2">當前匯率參考</h3>
                        <div id="exchangeRateInfo" class="text-xs text-slate-500 grid grid-cols-3 gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 px-6 py-3 flex justify-around items-center md:hidden z-50">
        <button onclick="switchTab('dashboard')" class="nav-item flex flex-col items-center gap-1 text-blue-600" id="nav-dashboard">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">首頁</span>
        </button>
        <button onclick="switchTab('history')" class="nav-item flex flex-col items-center gap-1 text-slate-400" id="nav-history">
            <i class="fa-solid fa-list-ul text-xl"></i>
            <span class="text-[10px] font-medium">明細</span>
        </button>
        <button onclick="switchTab('settings')" class="nav-item flex flex-col items-center gap-1 text-slate-400" id="nav-settings">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[10px] font-medium">設定</span>
        </button>
    </nav>

    <script>
        const DEFAULT_API_KEY = "272f193352024ce99416a7128bc499f6.QADLgmGclBxYOWYr";
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let apiKey = localStorage.getItem('zhipu_api_key') || DEFAULT_API_KEY;
        let rates = { "HKD": 1, "USD": 7.8, "JPY": 0.052, "TWD": 0.24, "CNY": 1.08, "EUR": 8.4, "GBP": 9.8 };

        // 語音辨識初始化
        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK'; // 設定為香港廣東話
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('quickText').placeholder = "請講話...";
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('quickText').value += text;
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('recording');
                document.getElementById('quickText').placeholder = "點擊右上方麥克風講話...";
            };

            recognition.onerror = (event) => {
                console.error("語音辨識出錯", event.error);
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('recording');
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("您的瀏覽器不支援語音辨識");
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKey').value = apiKey;
            fetchRates();
            renderExpenses();
        });

        async function fetchRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                if (data && data.rates) {
                    for (let curr in rates) {
                        if (data.rates[curr]) rates[curr] = parseFloat((1 / data.rates[curr]).toFixed(5));
                    }
                    updateRateUI();
                }
            } catch (e) { updateRateUI(); }
        }

        function updateRateUI() {
            const info = document.getElementById('exchangeRateInfo');
            if (info) info.innerHTML = Object.keys(rates).map(k => `<span>${k}: ${rates[k]}</span>`).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('text-blue-600'); el.classList.add('text-slate-400');
            });
            document.getElementById(`nav-${tabName}`).classList.add('text-blue-600');
            document.getElementById(`nav-${tabName}`).classList.remove('text-slate-400');
            renderExpenses();
            window.scrollTo(0, 0);
        }

        function saveConfig() {
            apiKey = document.getElementById('apiKey').value;
            localStorage.setItem('zhipu_api_key', apiKey);
            alert('設定已儲存！');
        }

        const AI_PROMPT = "分析內容，提取以下 JSON：{amount:數字, merchant:餐廳或商店名, currency:貨幣代碼, category:食|衣|住|行|育|樂|其他, date:YYYY-MM-DD, note:備註}。";

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('aiStatus').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                await callAI("glm-4v-flash", [
                    { type: "text", text: AI_PROMPT },
                    { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } }
                ]);
            };
            reader.readAsDataURL(file);
        }

        async function handleTextAI() {
            const text = document.getElementById('quickText').value;
            if (!text) return alert("請輸入或語音錄入文字");
            document.getElementById('aiStatus').classList.remove('hidden');
            await callAI("glm-4-flash", [{ type: "text", text: AI_PROMPT + " 內容如下：" + text }]);
            document.getElementById('quickText').value = "";
        }

        async function callAI(model, content) {
            const url = "https://open.bigmodel.cn/api/paas/v4/chat/completions";
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model, messages: [{ role: "user", content }], response_format: { type: "json_object" } })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);
                
                const rawAmount = String(res.amount).replace(/[^\d.]/g, '');
                const cleanAmount = parseFloat(rawAmount) || 0;
                
                const currency = (res.currency || "HKD").toUpperCase();
                const rate = rates[currency] || 1;
                const hkdAmount = Math.round(cleanAmount * rate * 100) / 100;

                addExpenseRecord(hkdAmount, res.category, res.merchant || res.note || "未知商戶", res.date || new Date().toISOString().split('T')[0], {
                    originalAmount: cleanAmount,
                    originalCurrency: currency
                });
                alert(`已記錄：${res.merchant || ""} HKD ${hkdAmount}`);
            } catch (e) {
                console.error(e);
                alert("AI 辨識發生錯誤");
            } finally {
                document.getElementById('aiStatus').classList.add('hidden');
            }
        }

        function addExpenseManually() {
            const merchant = document.getElementById('manualMerchant').value;
            const amount = parseFloat(document.getElementById('manualAmount').value) || 0;
            const currency = document.getElementById('manualCurrency').value;
            const category = document.getElementById('manualCategory').value;
            if (amount <= 0) return alert('請輸入金額');

            const rate = rates[currency] || 1;
            const hkdAmount = Math.round(amount * rate * 100) / 100;

            addExpenseRecord(hkdAmount, category, merchant || "手動新增", new Date().toISOString().split('T')[0], {
                originalAmount: amount,
                originalCurrency: currency
            });
            document.getElementById('manualMerchant').value = '';
            document.getElementById('manualAmount').value = '';
        }

        function addExpenseRecord(amount, category, note, date, extra = null) {
            expenses.unshift({ id: Date.now(), amount, category, note, date, extra });
            localStorage.setItem('expenses', JSON.stringify(expenses));
            renderExpenses();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            renderExpenses();
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            const recentList = document.getElementById('recentList');
            const totalEl = document.getElementById('totalAmount');
            const todayEl = document.getElementById('todayAmount');
            
            let total = 0, todayTotal = 0;
            const todayStr = new Date().toISOString().split('T')[0];

            const html = (items) => {
                if (items.length === 0) return `<div class="p-10 text-center text-slate-400 text-sm">尚無記錄</div>`;
                return items.map(exp => {
                    const icon = getCategoryIcon(exp.category);
                    const originalInfo = exp.extra && exp.extra.originalCurrency !== 'HKD' 
                        ? `<span class="currency-tag">${exp.extra.originalAmount} ${exp.extra.originalCurrency}</span>` 
                        : '';
                    return `
                        <div class="expense-item p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-500 border border-slate-100">
                                    <i class="${icon}"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm">${exp.note} ${originalInfo}</h4>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${exp.date} • ${exp.category}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-slate-900">$${exp.amount.toLocaleString(undefined, {minimumFractionDigits: 1})}</p>
                                <button onclick="deleteExpense(${exp.id})" class="text-[10px] text-red-300 hover:text-red-500">刪除</button>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            expenses.forEach(e => {
                total += e.amount;
                if(e.date === todayStr) todayTotal += e.amount;
            });

            totalEl.innerText = total.toLocaleString(undefined, {maximumFractionDigits: 1});
            todayEl.innerText = todayTotal.toLocaleString(undefined, {maximumFractionDigits: 1});
            if (list) list.innerHTML = html(expenses);
            if (recentList) recentList.innerHTML = html(expenses.slice(0, 4));
        }

        function getCategoryIcon(cat) {
            const icons = { '食': 'fa-solid fa-burger', '衣': 'fa-solid fa-bag-shopping', '住': 'fa-solid fa-couch', '行': 'fa-solid fa-bus', '育': 'fa-solid fa-graduation-cap', '樂': 'fa-solid fa-ticket', '其他': 'fa-solid fa-tag' };
            return icons[cat] || 'fa-solid fa-tag';
        }

        function clearData() { if(confirm('確定清除所有數據？')) { expenses = []; localStorage.setItem('expenses', '[]'); renderExpenses(); } }
    </script>
</body>
</html>
