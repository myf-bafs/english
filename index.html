<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAFS 商業大亨 - 終極完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans HK', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #064e3b 100%);
            color: #333;
            overflow: hidden;
        }
        
        /* 響應式棋盤容器 */
        .board-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            padding-bottom: 70px;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 95vh;
            aspect-ratio: 12 / 11;
            background-color: #1e293b;
            border: 6px solid #0f172a;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .tile {
            background-color: #fbf8ef;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #cbd5e1;
        }

        .tile:hover { transform: scale(1.15); z-index: 20; box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: #fbbf24; }
        .tile-color-header { height: 25%; width: 100%; border-bottom: 2px solid rgba(0,0,0,0.2); }
        .tile-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 2px 1px; text-align: center; }
        
        .tile-name { font-weight: 900; font-size: clamp(0.35rem, 1.4vw, 0.85rem); line-height: 1.1; color: #1e293b; }
        .tile-price { font-size: clamp(0.35rem, 1.2vw, 0.7rem); font-weight: bold; color: #475569; display: flex; align-items: center; gap: 1px; }
        .tile-desc { font-size: clamp(0.3rem, 1vw, 0.55rem); color: #64748b; line-height: 1; margin-top: 2px; }
        
        .tile-start { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); justify-content: center; }
        .tile-chance { background: linear-gradient(135deg, #f3e8ff 0%, #d8b4fe 100%); justify-content: center; }
        .tile-tax { background: linear-gradient(135deg, #fecaca 0%, #f87171 100%); color: #7f1d1d; justify-content: center; }
        .tile-rest { background: linear-gradient(135deg, #bfdbfe 0%, #60a5fa 100%); justify-content: center; }
        
        .board-center {
            grid-column: 2 / 12;
            grid-row: 2 / 11;
            background: radial-gradient(circle, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.1);
            border: 3px dashed #94a3b8;
            margin: 4px;
            position: relative;
        }

        .token-container { position: absolute; inset: auto 0 2px 0; display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; width: 100%; pointer-events: none; }
        .token { width: clamp(10px, 2vw, 24px); height: clamp(10px, 2vw, 24px); border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: clamp(6px, 1.2vw, 14px); z-index: 10; background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.1) 100%); animation: float 2s ease-in-out infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-animate { animation: fadeIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes diceShake { 0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(-25deg) scale(1.3); } 50% { transform: rotate(25deg) scale(1.3); } 75% { transform: rotate(-15deg) scale(1.3); } 100% { transform: rotate(0deg) scale(1); } }
        .animate-dice { animation: diceShake 0.4s ease-in-out; }
        @keyframes popIn { 0% { transform: scale(0) translateY(-20px) rotate(-10deg); opacity: 0; } 70% { transform: scale(1.3) translateY(5px) rotate(5deg); opacity: 1; } 100% { transform: scale(1) translateY(0) rotate(0); opacity: 1; } }
        .token-animate { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .owner-ring { position: absolute; inset: 0; border: 3px solid transparent; border-radius: 4px; pointer-events: none; opacity: 0.8; }
        .trend-up { color: #10b981; font-weight: bold; }
        .trend-down { color: #ef4444; font-weight: bold; }

        /* 經濟週期特效 */
        .eco-boom { background: linear-gradient(to right, #dcfce7, #bbf7d0); color: #166534; border: 1px solid #22c55e; }
        .eco-recession { background: linear-gradient(to right, #fef08a, #fde047); color: #854d0e; border: 1px solid #eab308; }
        .eco-depression { background: linear-gradient(to right, #fee2e2, #fecaca); color: #991b1b; border: 1px solid #ef4444; }
        .eco-recovery { background: linear-gradient(to right, #e0f2fe, #bae6fd); color: #075985; border: 1px solid #38bdf8; }

        /* Stepper input 隱藏原生箭頭 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800 selection:bg-blue-200">

    <!-- 頂部導航 -->
    <header class="bg-slate-900/80 backdrop-blur-md text-white p-3 shadow-lg flex justify-between items-center z-20 border-b border-slate-700">
        <h1 class="text-lg md:text-2xl font-black flex items-center gap-2 text-yellow-400 drop-shadow-md tracking-wide">
            <span class="text-2xl">🏦</span> BAFS 商業大亨
        </h1>
        <div id="user-info" class="text-sm md:text-base hidden flex items-center gap-3">
            <div class="bg-slate-800 px-4 py-1 rounded-full border border-slate-600 shadow-inner text-white font-bold" id="display-name"></div>
            <button onclick="window.quitGame()" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded-full shadow transition-colors border border-red-400 font-bold flex items-center gap-1">
                🚪 退出遊戲
            </button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden flex flex-col">
        <!-- 視圖 1: 登入 -->
        <div id="view-login" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-30">
            <div class="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-white/50">
                <div class="text-7xl mb-4 drop-shadow-lg">👔</div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">商業帝國</h2>
                <p class="text-slate-500 mb-6 font-bold">歡迎來到殘酷的資本市場</p>
                <input type="text" id="input-name" placeholder="輸入董事長大名..." class="w-full border-2 border-slate-200 rounded-xl p-4 mb-6 focus:outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-500/20 text-center text-lg font-bold bg-slate-50 transition-all">
                <button id="btn-login" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-white font-black py-4 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 text-lg">進入交易所</button>
            </div>
        </div>

        <!-- 視圖 2: 遊戲大廳 -->
        <div id="view-lobby" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-20 hidden">
            <div class="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border border-white/50">
                <h2 class="text-3xl font-black text-slate-800 mb-6">遊戲大廳</h2>
                <div class="mb-6 p-5 bg-slate-50 rounded-2xl border border-slate-200 hover:border-blue-300 transition-colors">
                    <h3 class="font-bold text-slate-500 mb-3 text-sm tracking-wider">開創新局 (教師/房主)</h3>
                    <button id="btn-create-room" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-md transition-transform active:scale-95">創建專屬房間</button>
                </div>
                <div class="flex items-center my-4 opacity-50"><div class="flex-1 border-t-2 border-slate-300"></div><span class="px-4 text-slate-500 font-bold">OR</span><div class="flex-1 border-t-2 border-slate-300"></div></div>
                <div class="p-5 bg-slate-50 rounded-2xl border border-slate-200 hover:border-blue-300 transition-colors">
                    <h3 class="font-bold text-slate-500 mb-3 text-sm tracking-wider">參與競爭 (學生)</h3>
                    <div class="flex gap-2">
                        <input type="text" id="input-room-code" placeholder="4位數代碼" class="flex-1 border-2 border-slate-200 rounded-xl p-3 text-center tracking-widest text-2xl font-mono focus:outline-none focus:border-blue-500 uppercase" maxlength="4">
                        <button id="btn-join-room" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-transform active:scale-95">加入</button>
                    </div>
                </div>
                <p id="lobby-msg" class="text-red-500 font-bold text-sm mt-4 hidden animate-pulse"></p>
            </div>
        </div>

        <!-- 視圖 3: 等候室 -->
        <div id="view-waiting" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-20 hidden">
            <div class="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border border-white/50">
                <h2 class="text-2xl font-black text-slate-800 mb-2">準備開市</h2>
                <div class="text-5xl font-mono font-black tracking-[0.2em] text-blue-600 my-6 bg-blue-50 py-4 rounded-xl border-2 border-blue-200 shadow-inner" id="display-room-code">----</div>
                <div class="flex justify-between items-end border-b-2 border-slate-100 pb-2 mb-4">
                    <h3 class="font-bold text-slate-600">與會董事</h3>
                    <span class="bg-slate-200 text-slate-600 text-xs font-bold px-2 py-1 rounded-full">已加入: <span id="player-count">0</span> 人</span>
                </div>
                <ul id="waiting-player-list" class="text-left mb-8 space-y-3 min-h-[120px]"></ul>
                <button id="btn-start-game" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95 text-lg hidden">正式開盤 ➔</button>
                <p id="waiting-msg" class="text-slate-500 font-bold mt-2 animate-pulse">等待房主敲響開市鐘...</p>
            </div>
        </div>

        <!-- 視圖 4: 遊戲主畫面 -->
        <div id="view-game" class="absolute inset-0 flex flex-col lg:flex-row hidden overflow-hidden">
            
            <!-- 左側：棋盤區 -->
            <div class="flex-1 overflow-auto board-wrapper no-scrollbar relative">
                <div class="board-grid relative" id="board">
                    <div class="board-center">
                        <div class="absolute top-4 right-4 bg-slate-800 text-white px-3 py-1 rounded-full text-[10px] md:text-xs font-mono font-bold shadow z-20">
                            ROOM: <span id="game-room-code" class="text-yellow-400"></span>
                        </div>
                        <h2 class="text-3xl md:text-5xl font-black text-slate-800 tracking-tighter drop-shadow-md mb-1">BAFS</h2>
                        <h3 class="text-lg md:text-2xl font-bold text-slate-600 tracking-widest mb-2">商業大亨</h3>
                        
                        <!-- 經濟指示器 -->
                        <div id="eco-indicator" class="px-4 py-1.5 rounded-full font-bold text-xs md:text-sm shadow-sm eco-recovery mt-1 mb-2 animate-pulse transition-colors">
                            🌍 經濟：復甦期
                        </div>

                        <div class="bg-white/80 backdrop-blur border border-slate-300 px-3 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-700 shadow-inner mb-2 w-[85%] md:w-[70%] flex items-center justify-center gap-2 md:gap-4">
                            <span class="text-indigo-600">🏦 銀行利率: <span id="interest-rate-display" class="text-lg">10%</span></span>
                        </div>
                        
                        <div class="w-full max-w-[150px] md:max-w-[200px] h-[2px] bg-slate-300 my-1 md:my-3"></div>
                        
                        <div id="dice-display" class="text-6xl md:text-7xl my-2 drop-shadow-xl filter">🎲</div>
                        <div id="turn-indicator" class="font-bold text-sm md:text-lg text-blue-600 bg-blue-50 px-5 py-1.5 rounded-full shadow-sm mb-2">等待開始...</div>
                        
                        <div class="flex gap-2 mt-2">
                            <button id="btn-roll" class="bg-gradient-to-b from-red-500 to-red-700 hover:from-red-400 hover:to-red-600 border-b-4 border-red-900 text-white font-black py-2.5 px-8 rounded-full shadow-lg transition-all active:translate-y-1 active:border-b-0 hidden text-base md:text-xl">
                                擲骰子
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 常駐金融中心按鈕 -->
            <button id="btn-finance-anytime" class="fixed bottom-6 right-6 lg:bottom-10 lg:right-[400px] z-30 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-black p-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-transform flex items-center gap-2 border-2 border-white/50">
                <span class="text-2xl drop-shadow">🏦</span>
                <span class="hidden md:inline">全球金融中心</span>
            </button>

            <!-- 右側：資訊面板區 -->
            <div class="w-full lg:w-[380px] h-[45vh] lg:h-full bg-white/90 backdrop-blur-xl shadow-[-10px_0_30px_rgba(0,0,0,0.1)] border-l border-white flex flex-col z-10 rounded-t-3xl lg:rounded-t-none relative">
                <!-- 教師控制台 -->
                <div id="host-panel" class="hidden bg-slate-800 text-white p-3 border-b-4 border-yellow-500 rounded-t-3xl lg:rounded-t-none">
                    <div class="text-xs text-yellow-400 font-bold mb-2 uppercase tracking-widest flex items-center gap-1"><span>👨‍🏫</span> 教師上帝視角</div>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="window.hostAction('subsidy')" class="bg-slate-700 hover:bg-slate-600 text-[10px] md:text-xs py-1.5 rounded border border-slate-500 shadow-sm transition-transform active:scale-95">💰 津貼</button>
                        <button onclick="window.hostAction('cycle')" class="bg-slate-700 hover:bg-slate-600 text-[10px] md:text-xs py-1.5 rounded border border-slate-500 shadow-sm transition-transform active:scale-95">🔄 經濟</button>
                        <button onclick="window.hostAction('rateUp')" class="bg-indigo-700 hover:bg-indigo-600 text-[10px] md:text-xs py-1.5 rounded border border-indigo-500 shadow-sm transition-transform active:scale-95">📈 加息</button>
                        <button onclick="window.hostAction('rateDown')" class="bg-indigo-700 hover:bg-indigo-600 text-[10px] md:text-xs py-1.5 rounded border border-indigo-500 shadow-sm transition-transform active:scale-95">📉 減息</button>
                    </div>
                    <button onclick="window.hostAction('crash')" class="w-full mt-2 bg-red-900 hover:bg-red-800 text-red-100 text-[10px] md:text-xs py-1.5 rounded border border-red-700 shadow-sm transition-transform active:scale-95">📉 觸發全球股災</button>
                </div>

                <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center ${roomState?.hostId !== currentUser?.uid ? 'rounded-t-3xl lg:rounded-t-none' : ''}">
                    <h3 class="font-black text-slate-800 flex items-center gap-2">📊 財務報表</h3>
                    <span class="text-[10px] text-blue-600 font-bold bg-blue-100 px-2 py-1 rounded-full">點擊玩家查閱與交易</span>
                </div>
                
                <div id="in-game-players" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-100/50"></div>
                
                <div class="h-1/3 lg:h-2/5 flex flex-col border-t border-slate-200 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                    <div class="bg-white text-xs font-black text-slate-600 p-3 px-4 uppercase tracking-wider flex items-center gap-2 border-b border-slate-100">
                        <span>📜</span> 市場動態紀錄
                    </div>
                    <div id="game-logs" class="flex-1 overflow-y-auto p-4 text-[11px] md:text-xs space-y-2 font-mono text-slate-700 bg-white/50"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 全局模態框 -->
    <div id="global-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm md:max-w-md w-full modal-animate flex flex-col max-h-[90vh] overflow-hidden border border-white/50">
            <div id="modal-header" class="bg-gradient-to-r from-slate-800 to-slate-700 text-white p-5 font-black text-lg tracking-wide flex justify-between items-center">
                <span>提示</span>
            </div>
            <div id="modal-body" class="p-5 text-slate-700 overflow-y-auto flex-1 text-base">
                內容
            </div>
            <div id="modal-footer" class="bg-slate-50 p-4 border-t border-slate-200 flex justify-end gap-3 rounded-b-3xl"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, update, get, onValue, push } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // ==========================================
        // 0. 音效系統
        // ==========================================
        let audioCtx = null;
        const playTone = (freq, type, duration, vol=0.1) => {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch (e) { console.warn('Audio play failed', e); }
        };
        const sfx = {
            roll: () => playTone(400, 'sine', 0.1, 0.05),
            cash: () => { playTone(800, 'square', 0.1, 0.05); setTimeout(()=>playTone(1200, 'square', 0.2, 0.05), 100); },
            error: () => playTone(150, 'sawtooth', 0.3, 0.1),
            success: () => { playTone(500, 'sine', 0.1, 0.05); setTimeout(()=>playTone(700, 'sine', 0.2, 0.05), 100); },
            turn: () => playTone(600, 'triangle', 0.2, 0.05),
            alert: () => { playTone(900, 'sine', 0.1, 0.1); setTimeout(()=>playTone(900, 'sine', 0.1, 0.1), 150); }
        };

        // ==========================================
        // 1. 遊戲資料設定 (42 格版圖)
        // ==========================================
        const PLAYER_STYLES = [
            { color: '#ef4444', icon: '💼', role: '總裁' }, { color: '#3b82f6', icon: '🚀', role: '創業家' },
            { color: '#10b981', icon: '💎', role: '投資家' }, { color: '#f59e0b', icon: '📈', role: '分析師' },
            { color: '#8b5cf6', icon: '👑', role: '董事長' }, { color: '#ec4899', icon: '💡', role: '策劃師' }
        ];

        const ECO_PHASES = ['復甦', '繁榮', '衰退', '蕭條'];
        const ECO_MULTIPLIER = { '復甦': 1.0, '繁榮': 1.5, '衰退': 0.8, '蕭條': 0.5 };
        const ECO_STYLES = { '復甦': 'eco-recovery', '繁榮': 'eco-boom', '衰退': 'eco-recession', '蕭條': 'eco-depression' };

        const C_BROWN = '#8B4513'; const C_LBLUE = '#87CEEB'; const C_PINK = '#db2777'; 
        const C_ORANGE = '#f97316'; const C_RED = '#dc2626'; const C_YELLOW = '#eab308'; 
        const C_GREEN = '#16a34a'; const C_PURPLE = '#9333ea'; const C_BLUE = '#2563eb'; 
        const C_DGREEN = '#065f46'; const C_DBLUE = '#1e3a8a';

        const MAP_TILES = [
            { id: 0, name: "萬惡發薪日", type: "start", desc: "領薪/結算" },
            { id: 1, name: "呃錢士多", type: "property", price: 800, rent: 160, color: C_BROWN },
            { id: 2, name: "劣食冰室", type: "property", price: 800, rent: 160, color: C_BROWN },
            { id: 3, name: "老細傳召", type: "chance", desc: "機遇與風險" },
            { id: 4, name: "佛系網店", type: "property", price: 1000, rent: 200, color: C_LBLUE },

            if (!propData) return false;
            
            const ownerUid = propData.owner;
            const sameColorTiles = MAP_TILES.filter(t => t.color === tile.color && t.type === 'property');

        window.initiateTradeAnytime = async (tileId, targetUid, actionType) => {
            document.getElementById('global-modal').classList.add('hidden'); 
            const tile = MAP_TILES.find(t => t.id === tileId);
            const currentPrice = getCurrentPrice(tile);
            const me = roomState.players.find(p => p.uid === currentUser.uid);

            let offerHtml = '';
            
            if (actionType === 'buy') {
                const targetPlayer = roomState.players.find(p => p.uid === getPropData(tileId).owner);
                offerHtml = `
                    <div class="p-4 text-center bg-slate-50 rounded-xl border border-slate-200">
                        <p class="mb-3 text-slate-700 font-bold">你想向 <b>${targetPlayer.name}</b> 提出收購 <b>【${tile.name}】</b></p>
                        <div class="mb-4 text-blue-800 font-black bg-blue-100 py-2 rounded-lg border border-blue-200 shadow-sm flex flex-col">
                            <span class="text-xs text-blue-600 mb-1">該地段最新市值估價</span>
                            <span class="text-2xl">$${currentPrice}</span>
                        </div>
                        <p class="mb-3 text-slate-600 text-sm">可用現金: <b class="text-emerald-600">$${me.money}</b></p>
                        <input type="number" id="anytime-offer-price" value="${currentPrice}" class="w-full p-4 border-2 border-slate-300 rounded-xl text-2xl font-black text-center text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all bg-white" placeholder="報價金額">
                    </div>`;
            } else {
                let otherPlayers = roomState.players.filter(p => p.uid !== me.uid && !p.isBankrupt);
                if (otherPlayers.length === 0) {
                    sfx.error(); await showModal("⚠️ 錯誤", "目前沒有活躍玩家可進行交易！"); return;
                }
                let optHtml = `<select id="anytime-target-uid" class="w-full p-3 border-2 border-slate-300 rounded-xl mb-3 bg-white font-bold text-slate-700 focus:outline-none focus:border-blue-500">`;
                otherPlayers.forEach(p => { optHtml += `<option value="${p.uid}">${p.name} (資金: $${p.money})</option>`; });
                optHtml += `</select>`;

                offerHtml = `
                    <div class="p-4 text-center bg-slate-50 rounded-xl border border-slate-200">
                        <p class="mb-3 text-slate-700 font-bold">你想將 <b>【${tile.name}】</b> 出售給哪位玩家？</p>
                        ${optHtml}
                        <div class="mb-4 text-blue-800 font-black bg-blue-100 py-2 rounded-lg border border-blue-200 shadow-sm flex flex-col">
                            <span class="text-xs text-blue-600 mb-1">該地段最新市值估價</span>
                            <span class="text-2xl">$${currentPrice}</span>
                        </div>
                        <input type="number" id="anytime-offer-price" value="${currentPrice}" class="w-full p-4 border-2 border-slate-300 rounded-xl text-2xl font-black text-center text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all bg-white" placeholder="報價金額">
                    </div>`;
            }

            const sendOffer = await showModal(`🤝 ${actionType==='buy'?'發起收購':'出售資產'}`, offerHtml, [
                {text: '送出報價', style: 'bg-emerald-600 hover:bg-emerald-500 w-full', resolveWith: 'send'},
                {text: '取消', style: 'bg-slate-400 hover:bg-slate-500 w-full mt-2', resolveWith: 'cancel'}
            ]);

            if (sendOffer === 'send') {
                const price = parseInt(document.getElementById('anytime-offer-price').value);
                let finalTargetUid = actionType === 'buy' ? getPropData(tileId).owner : document.getElementById('anytime-target-uid').value;
                
                if (actionType === 'buy' && price > me.money) {
                    const loanRes = await promptQuickLoan(me, price);
                    if (loanRes.success) {
                        let players = [...roomState.players]; players[roomState.players.findIndex(p=>p.uid===me.uid)] = me;
                        try { await update(getRoomRef(currentRoomId), { players, logs: [...roomState.logs, `🏦 ${me.name} 緊急貸款 $${loanRes.amt} 準備收購。`] }); } catch(e){}
                    } else { return; }
                }

                if (price > 0) {
                    try { await update(getRoomRef(currentRoomId), { anytimeTradeOffer: { type: actionType, from: me.uid, to: finalTargetUid, tileId: tile.id, price: price, status: 'pending' } }); } catch(e){}
                    showModal("⏳", "<div class='text-center p-6'><div class='text-5xl animate-bounce mb-4'>📨</div><div class='font-bold text-slate-600'>等待對方回覆中...</div></div>", []);
                } else { sfx.error(); await showModal("⚠️", "無效金額"); }
            }
        };

        const handleAnytimeTradeObserver = () => {
            if (roomState && roomState.anytimeTradeOffer && roomState.anytimeTradeOffer.status === 'pending' && roomState.anytimeTradeOffer.to === currentUser.uid && !window.isNegotiatingAnytime) {
                window.isNegotiatingAnytime = true; sfx.alert();
                const offer = roomState.anytimeTradeOffer; const sender = roomState.players.find(p => p.uid === offer.from);
                const tile = MAP_TILES.find(t => t.id === parseInt(offer.tileId));
                
                let title = offer.type === 'buy' ? "收到收購邀請" : "收到出售邀請";
                let desc = offer.type === 'buy' ? `想向你收購 <b>【${tile.name}】</b>` : `想向你出售 <b>【${tile.name}】</b>`;

                showModal(`🤝 ${title}`, `
                    <div class="text-center space-y-4 my-2">
                        <p class="text-lg text-slate-700"><b>${sender.name}</b> ${desc}</p>
                        <div class="bg-slate-100 py-2 rounded-xl border border-slate-200">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block">該地段最新市值估價</span>
                            <span class="text-xl font-bold text-slate-700">$${getCurrentPrice(tile)}</span>
                        </div>
                        <div class="bg-blue-50 py-4 rounded-xl border-2 border-blue-200 shadow-inner">
                            <span class="text-sm font-bold text-blue-500 uppercase tracking-wider block mb-1">對方出價</span>
                            <span class="text-4xl font-black text-blue-700">$${offer.price}</span>
                        </div>
                    </div>`, [
                    {text: '同意交易', style: 'bg-emerald-600', resolveWith: 'accept'}, {text: '堅拒', style: 'bg-red-500', resolveWith: 'reject'}
                ]).then(async (res) => {
                    window.isNegotiatingAnytime = false;
                    if (res === 'accept') {
                        let players = [...roomState.players];
                        let meIdx = players.findIndex(p=>p.uid===currentUser.uid); let senderIdx = players.findIndex(p=>p.uid===sender.uid);
                        
                        if (offer.type === 'buy') {
                            if(players[senderIdx].money >= offer.price) {
                                players[senderIdx].money -= offer.price; players[meIdx].money += offer.price;
                                let props = {...roomState.properties}; props[tile.id] = { owner: sender.uid, level: getPropData(tile.id).level || 1 };
                                sfx.cash(); try{ await update(getRoomRef(currentRoomId), { players, properties: props, anytimeTradeOffer: { ...offer, status: 'accepted' } }); } catch(e){}
                            } else { try{await update(getRoomRef(currentRoomId), { anytimeTradeOffer: { ...offer, status: 'rejected' } });}catch(e){} }
                        } else {
                            if(players[meIdx].money >= offer.price) {
                                players[meIdx].money -= offer.price; players[senderIdx].money += offer.price;
                                let props = {...roomState.properties}; props[tile.id] = { owner: currentUser.uid, level: getPropData(tile.id).level || 1 };
                                sfx.cash(); try{await update(getRoomRef(currentRoomId), { players, properties: props, anytimeTradeOffer: { ...offer, status: 'accepted' } });}catch(e){}
                            } else {
                                sfx.error(); alert("你的現金不足！");
                                try{await update(getRoomRef(currentRoomId), { anytimeTradeOffer: { ...offer, status: 'rejected' } });}catch(e){}
                            }
                        }
                    } else { try{await update(getRoomRef(currentRoomId), { anytimeTradeOffer: { ...offer, status: 'rejected' } });}catch(e){} }
                });
            } else if (roomState && roomState.anytimeTradeOffer && roomState.anytimeTradeOffer.from === currentUser.uid && roomState.anytimeTradeOffer.status !== 'pending' && document.getElementById('global-modal').innerHTML.includes("等待對方回覆中")) {
                document.getElementById('global-modal').classList.add('hidden');
                let newLogs = [...roomState.logs];
                const tile = MAP_TILES.find(t => t.id === parseInt(roomState.anytimeTradeOffer.tileId));
                const targetPlayer = roomState.players.find(p => p.uid === roomState.anytimeTradeOffer.to);
                
                if (roomState.anytimeTradeOffer.status === 'accepted') {
                    newLogs.push(`🤝 成功以 $${roomState.anytimeTradeOffer.price} 完成 ${tile.name} 的產權交易！`);
                    sfx.success(); showModal("🎉 交易成功", "對方接受了報價！產權已轉移。");
                } else {
                    newLogs.push(`❌ ${targetPlayer.name} 拒絕了報價。`);
                    sfx.error(); showModal("💔 交易失敗", "對方拒絕了報價或現金不足！");
                }
                try{update(getRoomRef(currentRoomId), { anytimeTradeOffer: null, logs: newLogs });}catch(e){}
            }
        };

        // ==========================================
        // 5. 初始化與主畫面更新
        // ==========================================
        const updateUI = () => {
            if (!roomState) return;

            if (roomState.state === 'waiting') {
                showView('view-waiting');
                document.getElementById('display-room-code').innerText = roomState.roomCode;
                document.getElementById('player-count').innerText = roomState.players.length;
                
                const listEl = document.getElementById('waiting-player-list');
                listEl.innerHTML = '';
                roomState.players.forEach(p => {
                    listEl.innerHTML += `<li class="flex items-center gap-3 text-sm md:text-lg font-bold bg-slate-50 p-3 rounded-2xl border border-slate-200 shadow-sm"><span class="w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center text-white text-lg md:text-2xl shadow-inner border-2 border-white" style="background-color:${p.color}">${p.icon}</span><span>${p.name} ${p.uid === roomState.hostId ? '<span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded ml-2 shadow-sm">房主</span>' : ''}</span></li>`;
                });

                if (roomState.hostId === currentUser.uid) document.getElementById('btn-start-game').classList.remove('hidden');
            } else if (roomState.state === 'playing') {
                showView('view-game');
                document.getElementById('game-room-code').innerText = roomState.roomCode;
                
                const ecoEl = document.getElementById('eco-indicator');
                ecoEl.innerText = `🌍 經濟：${roomState.ecoCycle}期`;
                ecoEl.className = `px-5 py-1.5 rounded-full font-bold text-xs md:text-sm shadow-md mt-1 mb-2 border ${ECO_STYLES[roomState.ecoCycle]}`;
                document.getElementById('interest-rate-display').innerText = `${roomState.interestRate}%`;

                if (roomState.hostId === currentUser.uid) document.getElementById('host-panel').classList.remove('hidden');

                renderBoard();
                renderPlayers();
                renderLogs();
                checkTurnState();
                handleBuyoutOfferObserver(); 
                handleAnytimeTradeObserver(); 
                handleCallLoanObserver();
            }
        };

        const getTileGridPosition = (id) => {
            if (id >= 0 && id <= 11) return { col: id + 1, row: 1 };
            if (id >= 12 && id <= 20) return { col: 12, row: id - 11 + 1 };
            if (id >= 21 && id <= 32) return { col: 12 - (id - 21), row: 11 };
            return { col: 1, row: 11 - (id - 32) };
        };

        const renderBoard = () => {
            const boardEl = document.getElementById('board');
            Array.from(boardEl.children).forEach(c => { if (!c.classList.contains('board-center')) c.remove(); });

            MAP_TILES.forEach(tile => {
                const div = document.createElement('div');
                div.className = `tile tile-${tile.type}`;
                const pos = getTileGridPosition(tile.id);
                div.style.gridColumn = pos.col; div.style.gridRow = pos.row;
                div.onclick = () => showPropertyCard(tile);
                
                let contentHTML = '';
                if (tile.type === 'property') {
                    const cPrice = getCurrentPrice(tile);
                    let trendIcon = '';
                    if (cPrice > tile.price) trendIcon = `<span class="text-emerald-600 text-[8px] ml-0.5">▲</span>`;
                    else if (cPrice < tile.price) trendIcon = `<span class="text-red-600 text-[8px] ml-0.5">▼</span>`;

                    contentHTML += `<div class="tile-color-header" style="background-color: ${tile.color}"></div>`;
                    contentHTML += `<div class="tile-body"><div class="tile-name mt-1">${tile.name}</div><div class="tile-price mb-1">$${cPrice}${trendIcon}</div></div>`;
                } else {
                    contentHTML += `<div class="tile-body justify-center"><div class="tile-name">${tile.name}</div>`;
                    if (tile.desc) contentHTML += `<div class="tile-desc">${tile.desc}</div>`;
                    contentHTML += `</div>`;
                }

                if (roomState.properties[tile.id]) {
                    const prop = getPropData(tile.id);
                    const p = roomState.players.find(p => p.uid === prop.owner);
                    if (p) {
                        contentHTML += `<div class="owner-ring" style="border-color: ${p.color}"></div>`;
                        let starsHtml = Array(prop.level).fill('⭐').join('');
                        
                        if (checkMonopoly(tile.id)) {
                            contentHTML += `<div class="absolute top-1 left-1 bg-gradient-to-r from-yellow-400 to-red-500 text-white text-[6px] md:text-[8px] font-bold px-1 rounded shadow-sm animate-pulse z-10">✨壟斷x2</div>`;
                        }
                        
                        contentHTML += `<div class="absolute top-1 right-1 text-[7px] md:text-[9px] bg-white/90 rounded px-[2px] shadow-sm tracking-tighter z-10">${starsHtml}</div>`;
                    }
                }

                let tokensHTML = '<div class="token-container">';
                roomState.players.forEach(p => {
                    if (!p.isBankrupt && p.pos === tile.id) {
                        tokensHTML += `<div class="token token-animate" style="border-color: ${p.color}; color: ${p.color}; background: white;">${p.icon}</div>`;
                    }
                });
                tokensHTML += '</div>';

                div.innerHTML = contentHTML + tokensHTML;
                boardEl.appendChild(div);
            });
        };

        const renderPlayers = () => {
            const container = document.getElementById('in-game-players');
            container.innerHTML = '';
            roomState.players.forEach((p, idx) => {
                const isCurrentTurn = (roomState.turnIndex % roomState.players.length) === idx;
                const turnStyle = isCurrentTurn ? 'ring-2 ring-blue-500 bg-white shadow-lg transform scale-[1.02] border-none' : 'border border-slate-200 bg-white/60 hover:bg-white cursor-pointer';
                const bankruptStyle = p.isBankrupt ? 'opacity-40 grayscale pointer-events-none' : '';
                
                let propCount = Object.keys(roomState.properties).filter(k => { const pData = getPropData(k); return pData && pData.owner === p.uid; }).length;
                
                let icons = '';
                if(propCount > 0) icons += `<span class="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded shadow-sm flex items-center">🏠x${propCount}</span>`;
                if(p.loan > 0) {
                    const cr = (p.money + getStockValue(p)) / p.loan;
                    if (cr < 1.0) {
                        icons += `<span class="bg-red-100 text-red-700 px-1.5 py-0.5 rounded shadow-sm animate-pulse font-bold border border-red-300">⚠️ CR: ${cr.toFixed(2)}</span>`;
                    } else {
                        icons += `<span class="bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded shadow-sm">💳 CR: ${cr.toFixed(2)}</span>`;
                    }
                }
                
                let hasStocks = Object.values(p.portfolio||{}).some(s => s.qty>0);
                if(hasStocks) icons += `<span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded shadow-sm">📈 股票</span>`;
                let hasIns = p.insurances && (p.insurances.tax || p.insurances.accident || p.insurances.comprehensive);
                if(hasIns) icons += `<span class="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded shadow-sm">🛡️ 保險</span>`;

                container.innerHTML += `
                    <div class="rounded-2xl p-3 flex items-center gap-3 ${turnStyle} ${bankruptStyle} transition-all duration-300" onclick="window.showPlayerAssets('${p.uid}')">
                        <div class="w-12 h-12 rounded-full shadow-inner border-4 flex items-center justify-center text-2xl bg-slate-50 flex-shrink-0" style="border-color: ${p.color}">
                            ${p.icon}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-slate-800 truncate text-base">${p.name} ${p.uid === currentUser.uid ? '<span class="text-[10px] font-bold text-white bg-blue-500 px-1.5 rounded-full ml-1 shadow-sm">YOU</span>' : ''}</div>
                            <div class="text-sm ${p.money<0 ? 'text-red-600' : 'text-emerald-600'} font-black tracking-wide">
                                💰 $${p.money}
                            </div>
                            <div class="text-[10px] flex gap-1 mt-1 flex-wrap">${icons}</div>
                        </div>
                    </div>`;
            });
        };

        const renderLogs = () => {
            const container = document.getElementById('game-logs');
            container.innerHTML = roomState.logs.slice(-20).reverse().map(log => `<div class="border-b border-slate-100 pb-2 mb-2 pl-3 border-l-4 hover:border-blue-400 transition-colors bg-slate-50/50 rounded-r-lg p-1">${log}</div>`).join('');
        };

        const checkTurnState = () => {
            const activePlayer = roomState.players[roomState.turnIndex % roomState.players.length];
            const indicator = document.getElementById('turn-indicator');
            const btnRoll = document.getElementById('btn-roll');

            if (activePlayer.isBankrupt) {
                if (roomState.hostId === currentUser.uid) { processEndOfTurnAndUpdate(activePlayer, roomState.turnIndex % roomState.players.length, [`⚠️ ${activePlayer.name} 已破產，自動跳過。`]); }
                return;
            }

            if (activePlayer.uid === currentUser.uid) {
                if (activePlayer.money < 0) {
                    if (roomState.anytimeTradeOffer && roomState.anytimeTradeOffer.from === currentUser.uid && roomState.anytimeTradeOffer.status === 'pending') {
                        indicator.innerText = "⏳ 等待買家回應報價...";
                        indicator.className = "font-bold text-sm text-blue-600 bg-blue-100 px-6 py-2 rounded-full animate-pulse";
                    } else {
                        indicator.innerText = "⚠️ 破產危機！請變賣資產";
                        indicator.className = "font-black text-base text-white bg-red-600 px-6 py-2 rounded-full shadow-lg animate-bounce";
                        showLiquidationModal(activePlayer);
                    }
                    btnRoll.classList.add('hidden');
                } else if (roomState.buyoutOffer && roomState.buyoutOffer.from === currentUser.uid && roomState.buyoutOffer.status === 'pending') {
                    indicator.innerText = "⏳ 等待要約回覆...";
                    indicator.className = "font-bold text-sm text-blue-600 bg-blue-100 px-6 py-2 rounded-full animate-pulse";
                    btnRoll.classList.add('hidden');
                } else if (roomState.anytimeTradeOffer && roomState.anytimeTradeOffer.from === currentUser.uid && roomState.anytimeTradeOffer.status === 'pending') {
                    indicator.innerText = "⏳ 等待收購回覆...";
                    indicator.className = "font-bold text-sm text-blue-600 bg-blue-100 px-6 py-2 rounded-full animate-pulse";
                    btnRoll.classList.add('hidden');
                } else if (roomState.callLoan && roomState.callLoan.uid === currentUser.uid && roomState.callLoan.status === 'pending') {
                    indicator.innerText = "⚠️ 銀行強制要求還款！";
                    indicator.className = "font-black text-base text-white bg-indigo-600 px-6 py-2 rounded-full shadow-lg animate-bounce";
                    btnRoll.classList.add('hidden');
                } else {
                    if(!window.turnSfxPlayed) { sfx.turn(); window.turnSfxPlayed = true; } 
                    indicator.innerText = "你的回合！";
                    indicator.className = "font-black text-base text-white bg-emerald-500 px-6 py-2 rounded-full shadow-lg animate-bounce";
                    btnRoll.classList.remove('hidden');
                }
            } else {
                window.turnSfxPlayed = false; 
                indicator.innerText = `等待 ${activePlayer.name}...`;
                indicator.className = "font-bold text-sm text-slate-500 bg-slate-200 px-6 py-2 rounded-full animate-pulse";
                btnRoll.classList.add('hidden');
            }
        };

        const processEndOfTurnAndUpdate = async (playerData, pIndex, logs) => {
            let players = [...roomState.players]; players[pIndex] = playerData;
            let nextTurnIndex = roomState.turnIndex + 1;
            let updates = { players, logs, turnIndex: nextTurnIndex };
            
            if (nextTurnIndex > 0 && nextTurnIndex % players.length === 0) {
                if (Math.random() < 0.25) { 
                    let currIdx = ECO_PHASES.indexOf(roomState.ecoCycle);
                    let nextCycle = ECO_PHASES[(currIdx + 1) % ECO_PHASES.length];
                    updates.ecoCycle = nextCycle;
                    logs.push(`🌍 【經濟轉型】全球經濟進入『${nextCycle}』期。`);
                }
                
                let newStocks = {...roomState.stocks};
                Object.keys(newStocks).forEach(k => {
                    let change = (Math.random() * 1.2) - 0.4; 
                    if (updates.ecoCycle === '繁榮' || roomState.ecoCycle === '繁榮') change += 0.2;
                    if (updates.ecoCycle === '蕭條' || roomState.ecoCycle === '蕭條') change -= 0.3;
                    newStocks[k].price = Math.max(10, Math.floor(newStocks[k].price * (1 + change)));
                });
                updates.stocks = newStocks;

                let newRate = roomState.interestRate;
                if(Math.random() < 0.3) newRate = Math.max(5, Math.min(25, newRate + (Math.random()>0.5?5:-5)));
                if(newRate !== roomState.interestRate) {
                    updates.interestRate = newRate;
                    logs.push(`🏦 市場利率調整為 ${newRate}%。`);
                }
            }
            try { await update(getRoomRef(currentRoomId), updates); } catch(e) { console.error("回合更新失敗", e); }
        };

        const checkAndFinalizeTurn = async (playerData, pIndex, logs) => {
            // 計算流動比率罰款
            if (playerData.loan > 0) {
                const cr = (playerData.money + getStockValue(playerData)) / playerData.loan;
                if (cr < 1.0) {
                    playerData.money -= 500;
                    logs.push(`⚠️ 財務告急：流動比率 (${cr.toFixed(2)}) 低於 1.0，被強制徵收 $500 罰款！`);
                    sfx.error();
                }
            }

            if (playerData.money >= 0) {
                await processEndOfTurnAndUpdate(playerData, pIndex, logs);
            } else {
                const myProps = Object.keys(roomState.properties).filter(k => { const p = getPropData(k); return p && p.owner === playerData.uid; });
                let hasStocks = Object.values(playerData.portfolio||{}).some(s => s.qty>0);
                if (myProps.length === 0 && !hasStocks) { 
                    playerData.isBankrupt = true;
                    logs.push(`💀 ${playerData.name} 資不抵債，正式破產！`); sfx.error();
                    await processEndOfTurnAndUpdate(playerData, pIndex, logs);
                } else {
                    let players = [...roomState.players]; players[pIndex] = playerData;
                    try { await update(getRoomRef(currentRoomId), { players, logs }); } catch(e) {}
                }
            }
        };

        const promptQuickLoan = async (player, requiredAmount) => {
            const needAmt = requiredAmount - player.money;
            const wantLoan = await showModal("⚠️ 資金不足",

                    if (ownerPlayer && !ownerPlayer.isBankrupt) {
                        let rent = getCurrentRent(tile, prop.level);
                        const isMonopoly = checkMonopoly(tile.id);
                        if (isMonopoly) rent *= 2;
                        
                        let rentMsg = `使用了 ${ownerPlayer.name} 的企業服務！`;
                        if (isMonopoly) rentMsg += `<br><span class="text-red-500 animate-pulse text-xs">👑 該企業已達成壟斷，租金翻倍！</span>`;

                        await showModal("💰 支付服務費", `<div class="bg-red-50 p-6 rounded-3xl border-2 border-red-200 text-center shadow-inner"><p class="text-slate-600 font-bold mb-2">${rentMsg}</p><p class="text-5xl font-black text-red-600 bg-white py-3 rounded-xl border border-red-100 shadow-sm my-4">$${rent}</p><div class="bg-red-100 text-red-800 text-xs py-2 px-3 rounded-lg font-bold">答對 BAFS 挑戰可享 半價 優惠！</div></div>`);
                        
                        if (await triggerBAFSQuestion()) { rent = Math.floor(rent / 2); sfx.success(); await showModal("🤝 談判成功", `<div class="text-center text-emerald-600 font-bold text-xl">成功爭取折扣，只需支付 $${rent}。</div>`); } 
                        else { sfx.error(); await showModal("💸 談判破裂", `<div class="text-center text-red-600 font-bold text-xl">需支付全額費用 $${rent}。</div>`); }

                        player.money -= rent;
                        let updatedPlayers = [...roomState.players]; updatedPlayers[pIndex] = player;
                        const oIdx = updatedPlayers.findIndex(p => p.uid === prop.owner);
                        if (oIdx !== -1) { updatedPlayers[oIdx] = {...updatedPlayers[oIdx]}; updatedPlayers[oIdx].money += rent; }
                        logs.push(`${player.name} 支付 $${rent} 予 ${ownerPlayer.name}。`);
                        
                        try{await update(getRoomRef(currentRoomId), { players: updatedPlayers, logs: logs });}catch(e){}

                        if (player.money >= 0) {
                            if (isMonopoly) {
                                logs.push(`🛡️ ${ownerPlayer.name} 已壟斷該產業，競爭對手無法提出惡意收購！`);
                            } else {
                                const wantBuyout = await showModal("🤝 惡意收購要約", `<div class="text-center p-4"><div class="text-5xl mb-3">💼</div><p class="font-bold text-slate-700">你想趁機向 <b>${ownerPlayer.name}</b> 提出收購嗎？</p></div>`, [{text: '發起要約', style: 'bg-blue-600 w-full', resolveWith: true}, {text: '結束回合', style: 'bg-slate-400 w-full mt-2', resolveWith: false}]);
                                if (wantBuyout) {
                                    const sendOffer = await showModal("💸 輸入收購報價", `<div class="mb-4 text-blue-600 font-bold bg-blue-50 p-3 rounded-xl text-center border border-blue-100"><span class="block text-xs text-slate-500 uppercase mb-1">該地段最新市值估價</span><span class="text-2xl">$${currentPrice}</span></div><input type="number" id="buyout-price" value="${currentPrice}" class="w-full p-4 border-2 border-slate-300 rounded-xl text-2xl font-black text-center focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 bg-white">`, [{text: '送出要約', style: 'bg-emerald-600 w-full', resolveWith: 'send'}, {text: '取消', style: 'bg-slate-400 w-full mt-2', resolveWith: 'cancel'}]);
                                    if (sendOffer === 'send') {
                                        const price = parseInt(document.getElementById('buyout-price').value);
                                        let finalPriceCanAfford = price <= player.money;
                                        if(!finalPriceCanAfford) {
                                            const lRes = await promptQuickLoan(player, price);
                                            if(lRes.success) { finalPriceCanAfford = true; let pTemp = [...roomState.players]; pTemp[pIndex] = player; try{await update(getRoomRef(currentRoomId), { players: pTemp, logs: [...roomState.logs, `🏦 ${player.name} 緊急貸款 $${lRes.amt} 準備收購。`] });}catch(e){} }
                                        }
                                        if (finalPriceCanAfford && price > 0) {
                                            try{await update(getRoomRef(currentRoomId), { buyoutOffer: { from: player.uid, to: ownerPlayer.uid, tileId: tile.id, price: price, status: 'pending' } });}catch(e){}
                                            showModal("⏳", "<div class='text-center p-6'><div class='text-5xl animate-bounce mb-4'>📨</div><div class='font-bold text-slate-600'>等待對方回覆中...</div></div>", []);
                                            const waitInterval = setInterval(async () => {
                                                if (roomState && roomState.buyoutOffer && roomState.buyoutOffer.status !== 'pending') {
                                                    clearInterval(waitInterval); document.getElementById('global-modal').classList.add('hidden');
                                                    let newLogs = [...roomState.logs];
                                                    if (roomState.buyoutOffer.status === 'accepted') {
                                                        sfx.success(); newLogs.push(`🤝 ${player.name} 成功收購 ${tile.name}。`); await showModal("🎉 收購成功", "對方接受了你的報價！產權已轉移。");
                                                    } else {
                                                        sfx.error(); newLogs.push(`❌ ${ownerPlayer.name} 拒絕了收購報價。`); await showModal("💔 收購失敗", "對方拒絕了你的報價！");
                                                    }
                                                    try{await update(getRoomRef(currentRoomId), { buyoutOffer: null, logs: newLogs });}catch(e){}
                                                    await checkAndFinalizeTurn(roomState.players.find(p=>p.uid===player.uid), pIndex, newLogs);
                                                }
                                            }, 500);
                                            return;
                                        } else { await showModal("⚠️", "資金不足或金額無效"); }
                                    }
                                }
                            }
                        }
                        await checkAndFinalizeTurn(roomState.players.find(p=>p.uid===player.uid), pIndex, roomState.logs);
                    } else { await checkAndFinalizeTurn(player, pIndex, logs); }
                }
            }
        };

        const showLiquidationModal = (player) => {
            if (window.isLiquidating) return; window.isLiquidating = true; sfx.error();
            let html = `<div class="bg-red-50 text-red-600 font-bold p-4 rounded-2xl mb-4 text-center border-2 border-red-200 shadow-inner">🚨 必須變賣資產直到資金為正數！</div>`;
            
            let hasStocks = Object.values(player.portfolio||{}).some(s => s.qty>0);
            if (hasStocks) {
                let allStockVal = getStockValue(player);
                html += `<div class="border-2 border-blue-200 p-4 rounded-2xl mb-4 flex justify-between items-center bg-blue-50 shadow-sm">
                    <span class="font-bold text-blue-800">📈 股票套現 <br><span class="text-xl font-black text-blue-600">$${allStockVal}</span></span>
                    <button onclick="window.sellStockLiq()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-md hover:bg-blue-500 transition-transform active:scale-95">全數賣出</button>
                </div>`;
                window.sellStockLiq = async () => {
                    document.getElementById('global-modal').classList.add('hidden'); window.isLiquidating = false;
                    let pIdx = roomState.turnIndex % roomState.players.length; let players = [...roomState.players]; let amt = 0;
                    Object.keys(players[pIdx].portfolio).forEach(sym => { amt += players[pIdx].portfolio[sym].qty * roomState.stocks[sym].price; players[pIdx].portfolio[sym].qty = 0; players[pIdx].portfolio[sym].avg = 0; });
                    players[pIdx].money += amt; sfx.cash();
                    try{await update(getRoomRef(currentRoomId), { players, logs: [...roomState.logs, `📉 ${players[pIdx].name} 破產變賣所有股票，套現 $${amt}。`] });}catch(e){}
                };
            }

            const myProps = Object.keys(roomState.properties).filter(k => { const p = getPropData(k); return p && p.owner === player.uid; });
            html += `<div class="max-h-[40vh] overflow-y-auto space-y-3 pb-2 pr-1">`;
            myProps.forEach(tileId => {
                const tile = MAP_TILES.find(t => t.id === parseInt(tileId));
                const currentPrice = getCurrentPrice(tile); const bankPrice = Math.floor(currentPrice * 0.5);
                html += `<div class="border-2 p-4 rounded-2xl bg-white shadow-sm flex flex-col gap-3" style="border-color: ${tile.color}">
                    <div class="font-black text-lg flex justify-between"><span>${tile.name}</span><span class="text-sm bg-slate-100 px-2 py-1 rounded text-slate-500">市值 $${currentPrice}</span></div>
                    <div class="flex gap-2">
                        <button class="flex-1 bg-slate-600 text-white text-xs font-bold py-2.5 rounded-xl shadow-md hover:bg-slate-500 transition-transform active:scale-95" onclick="window.sellToBank(${tile.id}, ${bankPrice})">賣給銀行 ($${bankPrice})</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            
            window.sellToBank = async (tileId, price) => {
                document.getElementById('global-modal').classList.add('hidden'); window.isLiquidating = false;
                let pIdx = roomState.turnIndex % roomState.players.length; let players = [...roomState.players];
                players[pIdx].money += price; let props = {...roomState.properties}; delete props[tileId]; sfx.cash();
                try{await update(getRoomRef(currentRoomId), { players, properties: props, logs: [...roomState.logs, `🏦 ${players[pIdx].name} 賣出企業套現 $${price}。`] });}catch(e){}
            };

            showModal("⚠️ 破產危機變賣", html, []).then(() => { window.isLiquidating = false; });
        };

        const handleBuyoutOfferObserver = () => {
            if (roomState && roomState.buyoutOffer && roomState.buyoutOffer.status === 'pending' && roomState.buyoutOffer.to === currentUser.uid && !window.isNegotiatingBuyout) {
                window.isNegotiatingBuyout = true; sfx.alert();
                const offer = roomState.buyoutOffer; const buyer = roomState.players.find(p => p.uid === offer.from);
                const tile = MAP_TILES.find(t => t.id === parseInt(offer.tileId));
                
                showModal("🤝 收到商業收購要約", `
                    <div class="text-center space-y-4 my-2">
                        <p class="text-lg text-slate-700"><b>${buyer.name}</b> 想向你收購 <b>【${tile.name}】</b></p>
                        <div class="bg-slate-100 py-2 rounded-xl border border-slate-200">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block">該地段最新市值估價</span>
                            <span class="text-xl font-bold text-slate-700">$${getCurrentPrice(tile)}</span>
                        </div>
                        <div class="bg-blue-50 py-4 rounded-xl border-2 border-blue-200 shadow-inner">
                            <span class="text-sm font-bold text-blue-500 uppercase tracking-wider block mb-1">對方出價</span>
                            <span class="text-4xl font-black text-blue-700">$${offer.price}</span>
                        </div>
                    </div>`, [
                    {text: '同意', style: 'bg-emerald-600', resolveWith: 'accept'}, {text: '拒絕', style: 'bg-red-500', resolveWith: 'reject'}
                ]).then(async (res) => {
                    window.isNegotiatingBuyout = false;
                    if (res === 'accept') {
                        let players = [...roomState.players];
                        players.find(p=>p.uid===buyer.uid).money -= offer.price;
                        players.find(p=>p.uid===currentUser.uid).money += offer.price;
                        let props = {...roomState.properties}; props[tile.id] = { owner: buyer.uid, level: getPropData(tile.id).level || 1 };
                        sfx.cash(); try{await update(getRoomRef(currentRoomId), { players, properties: props, buyoutOffer: { ...offer, status: 'accepted' } });}catch(e){}
                    } else { try{await update(getRoomRef(currentRoomId), { buyoutOffer: { ...offer, status: 'rejected' } });}catch(e){} }
                });
            } else if (roomState && roomState.buyoutOffer && roomState.buyoutOffer.from === currentUser.uid && roomState.buyoutOffer.status !== 'pending' && document.getElementById('global-modal').innerHTML.includes("等待對方回覆中")) {
                document.getElementById('global-modal').classList.add('hidden');
                let newLogs = [...roomState.logs];
                const tile = MAP_TILES.find(t => t.id === parseInt(roomState.buyoutOffer.tileId));
                
                if (roomState.buyoutOffer.status === 'accepted') {
                    newLogs.push(`🤝 成功以 $${roomState.buyoutOffer.price} 收購了 ${tile.name}！`);
                    sfx.success(); showModal("🎉 收購成功", "對方接受了報價！產權已轉移。");
                } else {
                    newLogs.push(`❌ 收購報價被拒絕。`);
                    sfx.error(); showModal("💔 收購失敗", "對方拒絕了報價或現金不足！");
                }
                try{update(getRoomRef(currentRoomId), { buyoutOffer: null, logs: newLogs });}catch(e){}
            }
        };

        const triggerBAFSQuestion = () => {
            return new Promise((resolve) => {
                const q = BAFS_QUESTIONS[Math.floor(Math.random() * BAFS_QUESTIONS.length)];
                let html = `<div class="text-red-600 font-bold mb-2 flex items-center justify-between"><span class="animate-pulse">⏳ 剩餘時間</span><span id="bafs-timer" class="text-2xl">15</span></div><p class="font-black text-lg mb-4 text-slate-800">${q.q}</p><div class="space-y-3">`;
                q.options.forEach((opt, i) => { html += `<button class="w-full text-left p-3 border-2 rounded-xl hover:bg-blue-50 font-bold text-slate-700 bafs-ans-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${opt}</button>`; });
                html += `</div>`;
                
                showModal(`🧠 知識挑戰`, html, []);
                
                let timeLeft = 15; let timerEl = document.getElementById('bafs-timer');
                let interval = setInterval(() => {
                    timeLeft--; if(timerEl) timerEl.innerText = timeLeft;
                    if (timeLeft <= 0) { clearInterval(interval); document.getElementById('global-modal').classList.add('hidden'); resolve(false); }
                }, 1000);

                document.getElementById('modal-body').querySelectorAll('.bafs-ans-btn').forEach(btn => {
                    btn.onclick = () => { clearInterval(interval); document.getElementById('global-modal').classList.add('hidden'); resolve(parseInt(btn.getAttribute('data-idx')) === q.ans); };
                });
            });
        };

        // 確保 DOM 載入後才綁定初始化
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();

            document.getElementById('btn-login').onclick = () => {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if(audioCtx.state === 'suspended') audioCtx.resume(); 
                } catch(e) {}

                if (!currentUser) return showModal("⚠️ 尚未連線", "正在連線至伺服器，請稍候...");
                const name = document.getElementById('input-name').value.trim();
                if (!name) return showModal("錯誤", "請輸入董事長大名！");
                localPlayerName = name;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('display-name').innerText = name;
                showView('view-lobby');
            };

            document.getElementById('btn-create-room').onclick = async () => {
                if (!currentUser) return showModal("⚠️ 錯誤", "尚未連線至伺服器！");
                try {
                    const code = Math.floor(1000 + Math.random() * 9000).toString();
                    const newRoomRef = push(ref(db, getRoomsPath()));
                    
                    await set(newRoomRef, {
                        roomCode: code, state: 'waiting', hostId: currentUser.uid, turnIndex: 0,
                        ecoCycle: '復甦', interestRate: 10,
                        stocks: {
                            tech: { name: '量子玄學(Tech)', price: 100 }, prop: { name: '納米樓(Prop)', price: 100 },
                            fin:  { name: '韭菜銀行(Fin)', price: 100 }, food: { name: '元素餐飲(Food)', price: 100 },
                            med:  { name: '包治百病(Med)', price: 100 }, ai:   { name: '人工智障(AI)', price: 100 },
                            crypto:{name: '空氣幣(Cryp)', price: 100 }, edu:  { name: '填鴨教育(Edu)', price: 100 },
                            news: { name: '震驚傳媒(News)', price: 100 }, eco:  { name: '用愛發電(Eco)', price: 100 }
                        },
                        players: [createInitialPlayer(currentUser.uid, localPlayerName, 0)],
                        properties: {}, logs: ["遊戲房間已創建。"]
                    });
                    currentRoomId = newRoomRef.key;
                    localStorage.setItem('bafsRoomId', currentRoomId);
                    listenToRoom(currentRoomId);
                } catch (err) { showModal("❌ 創建失敗", err.message); }
            };

            document.getElementById('btn-join-room').onclick = async () => {
                if (!currentUser) return showModal("⚠️ 錯誤", "尚未連線至伺服器！");
                const code = document.getElementById('input-room-code').value.trim().toUpperCase();
                const msgEl = document.getElementById('lobby-msg');
                if (code.length !== 4) { msgEl.innerText = "請輸入 4 位數代碼"; msgEl.classList.remove('hidden'); return; }
                msgEl.classList.add('hidden');
                
                try {
                    const snapshot = await get(ref(db, getRoomsPath()));
                    let targetRoomId = null, targetRoomData = null;

                    if (snapshot.exists()) {
                        const rooms = snapshot.val();
                        for (const key in rooms) {
                            if (rooms[key].roomCode === code && rooms[key].state === 'waiting') {
                                targetRoomId = key; targetRoomData = rooms[key]; break;
                            }
                        }
                    }

                    if (!targetRoomId) { msgEl.innerText = "找不到房間"; msgEl.classList.remove('hidden'); return; }
                    if (!targetRoomData.players) targetRoomData.players = [];

                    if (!targetRoomData.players.find(p => p.uid === currentUser.uid)) {
                        targetRoomData.players.push(createInitialPlayer(currentUser.uid, localPlayerName, targetRoomData.players.length));
                        await update(getRoomRef(targetRoomId), {
                            players: targetRoomData.players, logs: [...(targetRoomData.logs||[]), `${localPlayerName} 加入了房間！`]
                        });
                    }
                    currentRoomId = targetRoomId;
                    localStorage.setItem('bafsRoomId', currentRoomId);
                    listenToRoom(currentRoomId);
                } catch (err) { showModal("❌ 加入失敗", err.message); }
            };

            document.getElementById('btn-start-game').onclick = async () => {
                if (roomState && roomState.hostId === currentUser.uid) {
                    await update(getRoomRef(currentRoomId), { state: 'playing', logs: [...roomState.logs, "🚀 市場開盤！財務年度展開。"] });
                }
            };
        });
    </script>
</body>
</html>
