<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAFS 香港大富翁</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans HK', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #064e3b 100%);
            color: #333;
            overflow: hidden;
        }
        
        /* 大富翁棋盤網格設計 (全響應式) */
        .board-wrapper {
            width: 100%;
            height: 100%;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 10px;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            width: 100%;
            min-width: 780px; 
            min-height: 680px;
            max-width: 1200px; 
            margin: auto; 
            background-color: #1e293b;
            border: 8px solid #0f172a;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .tile {
            background-color: #fbf8ef;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #cbd5e1;
        }

        .tile:hover {
            transform: scale(1.15);
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: #fbbf24;
        }

        .tile-color-header { height: 28%; width: 100%; border-bottom: 2px solid #1e293b; }
        .tile-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 2px 1px; text-align: center; }
        .tile-name { font-weight: 900; font-size: clamp(0.45rem, 1.2vw, 0.8rem); line-height: 1.1; color: #1e293b; }
        .tile-price { font-size: clamp(0.4rem, 1vw, 0.65rem); font-weight: bold; color: #475569; display: flex; align-items: center; gap: 2px; }
        .tile-desc { font-size: clamp(0.35rem, 0.8vw, 0.55rem); color: #64748b; line-height: 1; margin-top: 2px; }
        
        .tile-start { background: linear-gradient(135deg, #fef08a 0%, #eab308 100%); justify-content: center; }
        .tile-chance { background: linear-gradient(135deg, #f3e8ff 0%, #d8b4fe 100%); justify-content: center; }
        .tile-tax { background: linear-gradient(135deg, #fecaca 0%, #f87171 100%); color: #7f1d1d; justify-content: center; }
        .tile-rest { background: linear-gradient(135deg, #bfdbfe 0%, #60a5fa 100%); justify-content: center; }
        
        .board-center {
            grid-column: 2 / 12;
            grid-row: 2 / 11;
            background: radial-gradient(circle, #fbf8ef 0%, #e2e8f0 100%);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.1);
            border: 4px dashed #94a3b8;
            margin: 4px;
            position: relative;
        }

        .token-container { position: absolute; inset: auto 0 2px 0; display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; width: 100%; pointer-events: none; }
        .token { width: clamp(14px, 2vw, 22px); height: clamp(14px, 2vw, 22px); border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: clamp(8px, 1.2vw, 12px); z-index: 10; background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.1) 100%); animation: float 2s ease-in-out infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-animate { animation: fadeIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes diceShake { 0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(-25deg) scale(1.3); } 50% { transform: rotate(25deg) scale(1.3); } 75% { transform: rotate(-15deg) scale(1.3); } 100% { transform: rotate(0deg) scale(1); } }
        .animate-dice { animation: diceShake 0.4s ease-in-out; }
        @keyframes popIn { 0% { transform: scale(0) translateY(-20px) rotate(-10deg); opacity: 0; } 70% { transform: scale(1.3) translateY(5px) rotate(5deg); opacity: 1; } 100% { transform: scale(1) translateY(0) rotate(0); opacity: 1; } }
        .token-animate { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .owner-ring { position: absolute; inset: 0; border: 3px solid transparent; border-radius: 4px; pointer-events: none; opacity: 0.8; }
        .trend-up { color: #10b981; font-weight: bold; }
        .trend-down { color: #ef4444; font-weight: bold; }
        .player-card:hover { background-color: rgba(241, 245, 249, 0.8); cursor: pointer; }

        /* 經濟週期特效 */
        .eco-boom { background-color: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .eco-recession { background-color: #fef08a; color: #854d0e; border: 1px solid #eab308; }
        .eco-depression { background-color: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .eco-recovery { background-color: #e0f2fe; color: #075985; border: 1px solid #38bdf8; }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800">

    <!-- 頂部導航 -->

        <h1 class="text-lg md:text-2xl font-black flex items-center gap-2 text-yellow-400 drop-shadow-md">
            <span class="text-2xl">🏦</span> BAFS 商業大亨
        </h1>
        <div id="user-info" class="text-sm md:text-base hidden bg-slate-800 px-4 py-1 rounded-full border border-slate-600 shadow-inner">

        </div>
    </header>

    <main class="flex-1 relative overflow-hidden flex flex-col">
        <!-- 視圖 1: 登入 -->

            <div class="bg-white/95 backdrop-blur p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border border-white/50">

                <input type="text" id="input-name" placeholder="輸入董事長大名..." class="w-full border-2 border-slate-200 rounded-xl p-4 mb-6 focus:outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-500/20 text-center text-lg font-bold bg-slate-50 transition-all">

            </div>
        </div>

        <!-- 視圖 2: 遊戲大廳 -->
        <div id="view-lobby" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-20 hidden">

                    <h3 class="font-bold text-slate-500 mb-3 text-sm tracking-wider">開創新局 (教師/房主)</h3>
                    <button id="btn-create-room" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-md transition-all">創建專屬房間</button>
                </div>

        </div>

        const listenToRoom = (roomId) => {

                if (!snapshot.exists()) return;

        // ==========================================

        };

        const getTileGridPosition = (id) => {
            if (id >= 0 && id <= 11) return { col: id + 1, row: 1 };
            if (id >= 12 && id <= 20) return { col: 12, row: id - 11 + 1 };
            if (id >= 21 && id <= 32) return { col: 12 - (id - 21), row: 11 };
            return { col: 1, row: 11 - (id - 32) };
        };

        const renderBoard = () => {
            const boardEl = document.getElementById('board');
            Array.from(boardEl.children).forEach(c => { if (!c.classList.contains('board-center')) c.remove(); });

            MAP_TILES.forEach(tile => {
                const div = document.createElement('div');
                div.className = `tile tile-${tile.type}`;
                const pos = getTileGridPosition(tile.id);
                div.style.gridColumn = pos.col; div.style.gridRow = pos.row;
                
                let contentHTML = '';
                if (tile.type === 'property') {
                    const cPrice = getCurrentPrice(tile);
                    contentHTML += `<div class="tile-color-header" style="background-color: ${tile.color}"></div>`;
                    contentHTML += `<div class="tile-body"><div class="tile-name mt-1">${tile.name}</div><div class="tile-price mb-1">$${cPrice}</div></div>`;
                } else {
                    contentHTML += `<div class="tile-body justify-center"><div class="tile-name">${tile.name}</div>`;

                if (roomState.properties[tile.id]) {

                    if (!p.isBankrupt && p.pos === tile.id) {

                    }
                });
                tokensHTML += '</div>';

                div.innerHTML = contentHTML + tokensHTML;
                boardEl.appendChild(div);
            });
        };

        const renderPlayers = () => {
            const container = document.getElementById('in-game-players');
            container.innerHTML = '';
            roomState.players.forEach((p, idx) => {
                const isCurrentTurn = (roomState.turnIndex % roomState.players.length) === idx;

                let icons = '';

                        <div class="w-10 h-10 md:w-12 md:h-12 rounded-full shadow-inner border-2 md:border-4 flex items-center justify-center text-xl md:text-2xl bg-white flex-shrink-0" style="border-color: ${p.color}">

        const renderLogs = () => {

            ).join('');
        };

        const checkTurnState = () => {
            const activePlayer = roomState.players[roomState.turnIndex % roomState.players.length];

                return;

            if (activePlayer.uid === currentUser.uid) {
                if (activePlayer.money < 0) {

                    btnFinance.classList.remove('hidden');
                }
            } else {
                indicator.innerText = `等待 ${activePlayer.name}...`;
                indicator.className = "font-bold text-sm text-slate-500 bg-slate-200 px-6 py-2 rounded-full animate-pulse";
                btnRoll.classList.add('hidden');
                btnFinance.classList.add('hidden');
            }
        };

        // ==========================================
        // 6. 經濟機制與控制台 (Teacher/Host)
        // ==========================================
        window.hostAction = async (type) => {
            if (roomState.hostId !== currentUser.uid) return;
            let logs = [...roomState.logs];
            let updates = {};
            
            if (type === 'subsidy') {
                let players = roomState.players.map(p => { if(!p.isBankrupt) p.money += 1000; return p; });
                logs.push("👨‍🏫 【政策】政府向所有活躍企業派發 $1,000 補助金！");
                updates = { players, logs };
            } else if (type === 'cycle') {
                let currIdx = ECO_PHASES.indexOf(roomState.ecoCycle);
                let nextCycle = ECO_PHASES[(currIdx + 1) % ECO_PHASES.length];
                logs.push(`🌍 【宏觀經濟】大環境進入『${nextCycle}』期！租金與地價受到影響。`);
                updates = { ecoCycle: nextCycle, logs };
            } else if (type === 'crash') {
                let newPrice = Math.max(10, Math.floor(roomState.stockPrice * 0.5));
                logs.push(`📉 【金融風暴】股市暴跌！恆指 ETF 跌至 $${newPrice}。`);
                updates = { stockPrice: newPrice, ecoCycle: '蕭條', logs };
            }
            await update(getRoomRef(currentRoomId), updates);
        };

        const processEndOfTurnAndUpdate = async (playerData, pIndex, logs) => {
            let players = [...roomState.players];
            players[pIndex] = playerData;
            let nextTurnIndex = roomState.turnIndex + 1;
            let updates = { players, logs, turnIndex: nextTurnIndex };
            
            // 每過一輪，機率變更市場
            if (nextTurnIndex > 0 && nextTurnIndex % players.length === 0) {
                if (Math.random() < 0.25) { // 25% 機率換週期
                    let currIdx = ECO_PHASES.indexOf(roomState.ecoCycle);
                    let nextCycle = ECO_PHASES[(currIdx + 1) % ECO_PHASES.length];
                    updates.ecoCycle = nextCycle;
                    logs.push(`🌍 【經濟轉型】全球經濟進入『${nextCycle}』期。`);
                }
                // 股票隨機波動
                let change = (Math.random() * 0.4) - 0.15; // -15% to +25%
                if (updates.ecoCycle === '繁榮' || roomState.ecoCycle === '繁榮') change += 0.2;
                if (updates.ecoCycle === '蕭條' || roomState.ecoCycle === '蕭條') change -= 0.3;
                let newStock = Math.max(10, Math.floor(roomState.stockPrice * (1 + change)));
                updates.stockPrice = newStock;
            }
            await update(getRoomRef(currentRoomId), updates);
        };

        const checkAndFinalizeTurn = async (playerData, pIndex, logs) => {
            if (playerData.money >= 0) {
                await processEndOfTurnAndUpdate(playerData, pIndex, logs);
            } else {
                const myProps = Object.keys(roomState.properties).filter(k => { const p = getPropData(k); return p && p.owner === playerData.uid; });
                if (myProps.length === 0 && (playerData.stocks || 0) === 0) { // 沒地沒股票
                    playerData.isBankrupt = true;
                    logs.push(`💀 ${playerData.name} 資不抵債，正式破產！`);
                    await processEndOfTurnAndUpdate(playerData, pIndex, logs);
                } else {
                    let players = [...roomState.players];
                    players[pIndex] = playerData;
                    await update(getRoomRef(currentRoomId), { players, logs });
                }
            }
        };

        // ==========================================
        // 7. 金融中心 (借貸、股票、保險)
        // ==========================================
        document.getElementById('btn-finance').onclick = () => {
            const pIdx = roomState.turnIndex % roomState.players.length;
            let player = roomState.players[pIdx];
            
            let html = `
                <div class="space-y-4">
                    <!-- 借貸 -->
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-indigo-800">🏦 銀行貸款</span>
                            <span class="text-sm text-indigo-600">已借: $${player.loan || 0}</span>
                        </div>
                        <p class="text-xs text-slate-500 mb-2">每次經過起點將扣除 10% 利息。</p>
                        <div class="flex gap-2">
                            <button onclick="window.financeAction('borrow')" class="flex-1 bg-indigo-600 text-white text-sm py-2 rounded shadow hover:bg-indigo-500">+ 借款 $1000</button>
                            <button onclick="window.financeAction('repay')" class="flex-1 bg-slate-600 text-white text-sm py-2 rounded shadow hover:bg-slate-500" ${player.loan>0?'':'disabled'}>- 還款 $1000</button>
                        </div>
                    </div>
                    
                    <!-- 股票 -->
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-blue-800">📈 恆指 ETF</span>
                            <span class="text-sm text-blue-600">現價: $${roomState.stockPrice} | 持有: ${player.stocks || 0}</span>
                        </div>
                        <p class="text-xs text-slate-500 mb-2">經過起點派發 5% 股息。價格隨經濟波動。</p>
                        <div class="flex gap-2">
                            <button onclick="window.financeAction('buyStock')" class="flex-1 bg-blue-600 text-white text-sm py-2 rounded shadow hover:bg-blue-500">買入 1 股</button>
                            <button onclick="window.financeAction('sellStock')" class="flex-1 bg-slate-600 text-white text-sm py-2 rounded shadow hover:bg-slate-500" ${(player.stocks||0)>0?'':'disabled'}>賣出 1 股</button>
                        </div>
                    </div>

                    <!-- 保險 -->
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 flex justify-between items-center">
                        <div>
                            <span class="font-bold text-emerald-800 block">🛡️ 綜合商業保險 ($500)</span>
                            <span class="text-xs text-slate-500">抵銷下一次稅務或意外損失。</span>
                        </div>
                        <button onclick="window.financeAction('buyIns')" class="bg-emerald-600 text-white px-4 py-2 rounded shadow hover:bg-emerald-500 text-sm" ${player.insurance?'disabled':''}>
                            ${player.insurance?'已受保':'投保'}
                        </button>
                    </div>
                </div>
            `;

            window.financeAction = async (act) => {
                let players = [...roomState.players];
                let p = players[pIdx];
                let logs = [...roomState.logs];
                
                if (act === 'borrow') { p.money += 1000; p.loan = (p.loan||0) + 1000; logs.push(`🏦 ${p.name} 向銀行貸款 $1,000。`); }
                if (act === 'repay' && p.loan > 0 && p.money >= 1000) { p.money -= 1000; p.loan -= 1000; logs.push(`🏦 ${p.name} 償還銀行貸款 $1,000。`); }
                if (act === 'buyStock' && p.money >= roomState.stockPrice) { p.money -= roomState.stockPrice; p.stocks = (p.stocks||0) + 1; logs.push(`📈 ${p.name} 買入 1 股恆指 ETF。`); }
                if (act === 'sellStock' && p.stocks > 0) { p.money += roomState.stockPrice; p.stocks -= 1; logs.push(`📉 ${p.name} 賣出 1 股恆指 ETF。`); }
                if (act === 'buyIns' && !p.insurance && p.money >= 500) { p.money -= 500; p.insurance = true; logs.push(`🛡️ ${p.name} 購買了綜合商業保險。`); }

                await update(getRoomRef(currentRoomId), { players, logs });
                document.getElementById('global-modal').classList.add('hidden');
            };

            showModal("🏦 金融中心服務", html, [{text: '關閉', style: 'bg-slate-400'}]);
        };

        // ==========================================
        // 8. 遊戲主流程 (擲骰子、扣稅保險、買賣地)
        // ==========================================
        document.getElementById('btn-roll').onclick = async () => {
            document.getElementById('btn-roll').classList.add('hidden');
            document.getElementById('btn-finance').classList.add('hidden');
            const diceDisplay = document.getElementById('dice-display');
            diceDisplay.classList.add('animate-dice');
            
            let rollInterval = setInterval(() => { diceDisplay.innerText = `🎲 ${Math.floor(Math.random() * 6) + 1}`; }, 80);
            await new Promise(r => setTimeout(r, 400));
            clearInterval(rollInterval);
            diceDisplay.classList.remove('animate-dice');

            const dice = Math.floor(Math.random() * 6) + 1;
            diceDisplay.innerText = `🎲 ${dice}`;
            
            const pIdx = roomState.turnIndex % roomState.players.length;
            let player = {...roomState.players[pIdx]};
            
            const oldPos = player.pos;
            let currentPos = player.pos;

            for(let i = 1; i <= dice; i++) {
                currentPos = (currentPos + 1) % 42;
                let tempPlayers = [...roomState.players];
                tempPlayers[pIdx] = {...player, pos: currentPos};
                await update(getRoomRef(currentRoomId), { players: tempPlayers });
                await new Promise(r => setTimeout(r, 200)); 
            }
            
            player.pos = currentPos;
            let logs = [...roomState.logs];
            
            // 經過起點結算：薪金 + 利息 - 股息
            if (player.pos < oldPos) {
                let income = 2000;
                let interest = player.loan > 0 ? Math.floor(player.loan * 0.1) : 0;
                let dividend = player.stocks > 0 ? Math.floor(player.stocks * roomState.stockPrice * 0.05) : 0;
                
                player.money += (income - interest + dividend);
                logs.push(`💵 ${player.name} 經過起點：薪金+$2000${interest>0?`, 扣利息-$${interest}`:''}${dividend>0?`, 派股息+$${dividend}`:''}`);
            }

            const tile = MAP_TILES[player.pos];
            logs.push(`${player.name} 擲出 ${dice}，抵達【${tile.name}】。`);

            let tempPlayers = [...roomState.players];
            tempPlayers[pIdx] = player;
            await update(getRoomRef(currentRoomId), { players: tempPlayers, logs: logs });

            setTimeout(() => handleTileAction(player, pIdx, tile, logs), 200);
        };

        const handleTileAction = async (player, pIndex, tile, currentLogs) => {
            let logs = [...currentLogs];
            
            if (tile.type === 'start' || tile.type === 'rest') {
                await checkAndFinalizeTurn(player, pIndex, logs);
            } 
            else if (tile.type === 'tax') {
                const tax = tile.id === 7 ? 500 : 1000;
                if (player.insurance) {
                    player.insurance = false;
                    await showModal("🛡️ 保險生效", "商業保險成功為你豁免了此次稅務！");
                    logs.push(`🛡️ 商業保險發揮作用，豁免了 ${player.name} $${tax} 稅款。`);
                } else {
                    await showModal("💸 稅務局", `<div class="text-center"><div class="text-4xl mb-2">🏛️</div>繳納${tile.name} <b class="text-red-500">$${tax}</b>！</div>`);
                    player.money -= tax;
                    logs.push(`${player.name} 繳納了 $${tax} 稅款。`);
                }
                await checkAndFinalizeTurn(player, pIndex, logs);
            }
            else if (tile.type === 'chance' || tile.type === 'destiny') {
                const card = CHANCE_CARDS[Math.floor(Math.random() * CHANCE_CARDS.length)];
                await showModal(`🌟 ${tile.name}`, `<div class="text-xl text-center py-6 text-purple-700 font-black bg-purple-50 rounded-xl">${card.msg}</div>`);
                
                if (card.amt < 0 && player.insurance) {
                    player.insurance = false;
                    logs.push(`🛡️ 保險生效，${player.name} 免除了 ${card.msg} 的損失。`);
                } else {
                    player.money += card.amt;
                    logs.push(`${player.name} 遇到${tile.name}：${card.msg}`);
                }
                await checkAndFinalizeTurn(player, pIndex, logs);
            }
            else if (tile.type === 'property') {
                const prop = getPropData(tile.id);
                const currentPrice = getCurrentPrice(tile);
                
                if (!prop) {
                    if (player.money >= currentPrice) {
                        const wantBuy = await showModal(`🏢 投資決策：${tile.name}`, 
                            `<div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <p class="text-lg">最新市值：<b class="text-slate-800">$${currentPrice}</b></p>
                                <p class="mt-2 text-sm text-slate-500">回答一條 BAFS 題目 (15秒) 獲取收購權利。</p>
                            </div>`, 
                            [{text: '挑戰收購', style: 'bg-emerald-600 hover:bg-emerald-500', resolveWith: true}, {text: '放棄', style: 'bg-slate-400', resolveWith: false}]
                        );

                        if (wantBuy) {
                            if (await triggerBAFSQuestion()) {
                                await showModal("🎉 收購成功", "商業知識過關！成功購入地段。");
                                player.money -= currentPrice;
                                let newProps = {...roomState.properties}; newProps[tile.id] = { owner: player.uid, level: 1 };
                                logs.push(`${player.name} 成功收購了 ${tile.name}。`);
                                await update(getRoomRef(currentRoomId), { properties: newProps });
                            } else {
                                await showModal("❌ 收購失敗", "回答錯誤或超時！銀行拒絕了你的申請。");
                            }
                        }
                    } else {
                        await showModal("⚠️ 資金不足", `現金不足以購買 ${tile.name} (市值 $${currentPrice})。`);
                    }
                    await checkAndFinalizeTurn(player, pIndex, logs);
                } 
                else if (prop.owner === player.uid) {
                    if (prop.level < 3) {
                        const upgradeCost = Math.floor(currentPrice * 0.5);
                        const wantUpgrade = await showModal(`🏗️ 升級物業：${tile.name}`, 
                            `<div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <p class="text-lg mt-2">升級費用：<b class="text-slate-800">$${upgradeCost}</b></p>
                                <p class="mt-2 text-sm text-red-600 font-bold">💡 升級後租金將倍增！</p>
                            </div>`, 
                            [{text: '挑戰升級', style: 'bg-blue-600 hover:bg-blue-500', resolveWith: true}, {text: '放棄', style: 'bg-slate-400', resolveWith: false}]
                        );

                        if (wantUpgrade && player.money >= upgradeCost) {
                            if (await triggerBAFSQuestion()) {
                                player.money -= upgradeCost;
                                let newProps = {...roomState.properties}; newProps[tile.id] = { owner: player.uid, level: prop.level + 1 };
                                logs.push(`${player.name} 將 ${tile.name} 升級至 Level ${prop.level + 1}。`);
                                await update(getRoomRef(currentRoomId), { properties: newProps });
                            } else {
                                await showModal("❌ 升級失敗", "回答錯誤或超時！");
                            }
                        }
                    }
                    await checkAndFinalizeTurn(player, pIndex, logs);
                }
                else {
                    const ownerPlayer = roomState.players.find(p => p.uid === prop.owner);
                    if (ownerPlayer && !ownerPlayer.isBankrupt) {
                        let rent = getCurrentRent(tile, prop.level);
                        await showModal("💰 支付租金", `<div class="bg-red-50 p-4 rounded-xl border border-red-100 text-center"><p>踩中 ${ownerPlayer.name} 的地盤！</p><p class="text-2xl font-black text-red-600 my-2">租金：$${rent}</p></div>`);
                        
                        if (await triggerBAFSQuestion()) { rent = Math.floor(rent / 2); await showModal("🤝 談判成功", `成功爭取半價，只需支付 $${rent}。`); } 
                        else { await showModal("💸 談判破裂", `需支付全額租金 $${rent}。`); }

                        player.money -= rent;
                        let updatedPlayers = [...roomState.players]; updatedPlayers[pIndex] = player;
                        const oIdx = updatedPlayers.findIndex(p => p.uid === prop.owner);
                        if (oIdx !== -1) { updatedPlayers[oIdx] = {...updatedPlayers[oIdx]}; updatedPlayers[oIdx].money += rent; }
                        logs.push(`${player.name} 支付 $${rent} 租金給 ${ownerPlayer.name}。`);
                        
                        await update(getRoomRef(currentRoomId), { players: updatedPlayers, logs: logs });

                        if (player.money >= 0) {
                            const wantBuyout = await showModal("🤝 發起商業收購", `<p class="text-center p-4">你想向 <b>${ownerPlayer.name}</b> 提出收購嗎？</p>`, [{text: '發起要約', style: 'bg-blue-600', resolveWith: true}, {text: '結束回合', style: 'bg-slate-400', resolveWith: false}]);
                            if (wantBuyout) {
                                const sendOffer = await showModal("💸 輸入收購報價", `<input type="number" id="buyout-price" value="${currentPrice}" class="w-full p-3 border-2 rounded-xl text-center">`, [{text: '送出', style: 'bg-emerald-600', resolveWith: 'send'}, {text: '取消', style: 'bg-slate-400', resolveWith: 'cancel'}]);
                                if (sendOffer === 'send') {
                                    const price = parseInt(document.getElementById('buyout-price').value);
                                    if (price <= player.money && price > 0) {
                                        await update(getRoomRef(currentRoomId), { buyoutOffer: { from: player.uid, to: ownerPlayer.uid, tileId: tile.id, price: price, status: 'pending' } });
                                        showModal("⏳", "等待對方回覆中...", []);
                                        const waitInterval = setInterval(async () => {
                                            if (roomState && roomState.buyoutOffer && roomState.buyoutOffer.status !== 'pending') {
                                                clearInterval(waitInterval); document.getElementById('global-modal').classList.add('hidden');
                                                let newLogs = [...roomState.logs];
                                                if (roomState.buyoutOffer.status === 'accepted') {
                                                    newLogs.push(`🤝 ${player.name} 成功收購 ${tile.name}。`);
                                                    await showModal("🎉 收購成功", "對方接受了你的報價！產權已轉移。");
                                                } else {
                                                    newLogs.push(`❌ ${ownerPlayer.name} 拒絕了收購報價。`);
                                                    await showModal("💔 收購失敗", "對方拒絕了你的報價！");
                                                }
                                                await update(getRoomRef(currentRoomId), { buyoutOffer: null, logs: newLogs });
                                                await checkAndFinalizeTurn(roomState.players.find(p=>p.uid===player.uid), pIndex, newLogs);
                                            }
                                        }, 500);
                                        return;
                                    } else { await showModal("⚠️", "資金不足或金額無效"); }
                                }
                            }
                        }
                        await checkAndFinalizeTurn(roomState.players.find(p=>p.uid===player.uid), pIndex, roomState.logs);
                    } else { await checkAndFinalizeTurn(player, pIndex, logs); }
                }
            }
        };

        // --- 破產清盤邏輯 ---
        const showLiquidationModal = (player) => {
            if (window.isLiquidating) return; window.isLiquidating = true;
            let html = `<div class="bg-red-50 text-red-600 font-bold p-3 rounded-lg mb-4 text-center border border-red-200">🚨 必須變賣資產直到資金為正數！</div>`;
            
            // 賣股票
            if (player.stocks > 0) {
                html += `<div class="border-2 border-blue-200 p-3 rounded-xl mb-3 flex justify-between items-center bg-blue-50">
                    <span>📈 恆指 ETF (${player.stocks}股) - $${roomState.stockPrice}/股</span>
                    <button onclick="window.sellStockLiq()" class="bg-blue-600 text-white px-3 py-1 rounded">賣出</button>
                </div>`;
                window.sellStockLiq = async () => {
                    document.getElementById('global-modal').classList.add('hidden'); window.isLiquidating = false;
                    let pIdx = roomState.turnIndex % roomState.players.length; let players = [...roomState.players];
                    players[pIdx].money += roomState.stockPrice; players[pIdx].stocks -= 1;
                    await update(getRoomRef(currentRoomId), { players });
                };
            }

            const myProps = Object.keys(roomState.properties).filter(k => { const p = getPropData(k); return p && p.owner === player.uid; });
            html += `<div class="max-h-[40vh] overflow-y-auto space-y-3">`;
            myProps.forEach(tileId => {
                const tile = MAP_TILES.find(t => t.id === parseInt(tileId));
                const bankPrice = Math.floor(getCurrentPrice(tile) * 0.5);
                html += `<div class="border-2 p-3 rounded-xl bg-white shadow-sm flex flex-col gap-2" style="border-color: ${tile.color}">
                    <div class="font-black text-lg">${tile.name}</div>
                    <div class="flex gap-2 mt-1">
                        <button class="flex-1 bg-slate-600 text-white text-sm py-2 rounded" onclick="window.sellToBank(${tile.id}, ${bankPrice})">賣給銀行 ($${bankPrice})</button>
                        <button class="flex-1 bg-blue-600 text-white text-sm py-2 rounded hover:bg-blue-500" onclick="window.offerToPlayer(${tile.id}, ${getCurrentPrice(tile)})">向玩家報價</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            
            window.sellToBank = async (tileId, price) => {
                document.getElementById('global-modal').classList.add('hidden'); window.isLiquidating = false;
                let pIdx = roomState.turnIndex % roomState.players.length; let players = [...roomState.players];
                players[pIdx].money += price; let props = {...roomState.properties}; delete props[tileId];
                await update(getRoomRef(currentRoomId), { players, properties: props, logs: [...roomState.logs, `🏦 ${players[pIdx].name} 賣出物業套現 $${price}。`] });
            };

            window.offerToPlayer = (tileId, currentPrice) => {
                document.getElementById('global-modal').classList.add('hidden'); window.isLiquidating = false;
                
                let otherPlayers = roomState.players.filter(p => p.uid !== player.uid && !p.isBankrupt);
                if (otherPlayers.length === 0) {
                    alert("目前沒有其他活躍玩家可以報價！"); showLiquidationModal(player); return;
                }

                let optHtml = `<select id="offer-target" class="w-full p-3 border-2 rounded-xl mb-4 bg-white">`;
                otherPlayers.forEach(p => { optHtml += `<option value="${p.uid}">${p.name} (資金: $${p.money})</option>`; });
                optHtml += `</select><input type="number" id="offer-price" value="${currentPrice}" class="w-full p-3 border-2 rounded-xl mb-4 text-center text-blue-600">`;

                showModal("🤝 發起破產出售報價", optHtml, [{text: '送出報價', style: 'bg-emerald-600', resolveWith: 'send'}, {text: '取消', style: 'bg-slate-400', resolveWith: 'cancel'}])
                .then(async (res) => {
                    if (res === 'send') {
                        const targetUid = document.getElementById('offer-target').value;
                        const price = parseInt(document.getElementById('offer-price').value);
                        if (price > 0) {
                            await update(getRoomRef(currentRoomId), {
                                tradeOffer: { from: player.uid, to: targetUid, tileId: tileId, price: price, status: 'pending' }
                            });
                            showModal("⏳", "等待對方回覆中...", []);
                            const waitInterval = setInterval(async () => {
                                if (roomState && roomState.tradeOffer && roomState.tradeOffer.status !== 'pending') {
                                    clearInterval(waitInterval); document.getElementById('global-modal').classList.add('hidden');
                                    let logs = [...roomState.logs];
                                    let sellerIdx = roomState.turnIndex % roomState.players.length;
                                    let refreshedPlayer = roomState.players[sellerIdx];
                                    
                                    if (roomState.tradeOffer.status === 'accepted') {
                                        logs.push(`🤝 對方接受了報價！成功賣出變現。`);
                                        await showModal("🎉 交易成功", "對方接受了你的報價！");
                                    } else {
                                        logs.push(`❌ 對方拒絕了報價。`);
                                        await showModal("💔 交易失敗", "對方拒絕了你的報價！");
                                    }
                                    await update(getRoomRef(currentRoomId), { tradeOffer: null, logs });
                                    
                                    if (refreshedPlayer.money >= 0) {
                                        logs.push(`✅ ${refreshedPlayer.name} 成功解除破產危機。`);
                                        await processEndOfTurnAndUpdate(refreshedPlayer, sellerIdx, logs);
                                    } else {
                                        const myProps = Object.keys(roomState.properties).filter(k => { const p = getPropData(k); return p && p.owner === refreshedPlayer.uid; });
                                        if (myProps.length === 0 && (refreshedPlayer.stocks || 0) === 0) {
                                            refreshedPlayer.isBankrupt = true;
                                            logs.push(`💀 ${refreshedPlayer.name} 資不抵債，正式破產！`);
                                            await processEndOfTurnAndUpdate(refreshedPlayer, sellerIdx, logs);
                                        } else {
                                            showLiquidationModal(refreshedPlayer);
                                        }
                                    }
                                }
                            }, 500);
                        } else { alert("無效金額"); showLiquidationModal(player); }
                    } else { showLiquidationModal(player); }
                });
            };

            showModal("⚠️ 破產危機變賣", html, []).then(() => { window.isLiquidating = false; });
        };

        // --- 接收要約 Observer ---
        const handleBuyoutOfferObserver = () => {
            if (roomState && roomState.buyoutOffer && roomState.buyoutOffer.status === 'pending' && roomState.buyoutOffer.to === currentUser.uid && !window.isNegotiatingBuyout) {
                window.isNegotiatingBuyout = true;
                const offer = roomState.buyoutOffer; const buyer = roomState.players.find(p => p.uid === offer.from);
                const tile = MAP_TILES.find(t => t.id === parseInt(offer.tileId));
                
                showModal("🤝 收到商業收購要約", `<div class="text-center"><p>${buyer.name} 出價 <b>$${offer.price}</b> 收購你的【${tile.name}】</p></div>`, [
                    {text: '同意', style: 'bg-emerald-600', resolveWith: 'accept'}, {text: '拒絕', style: 'bg-red-500', resolveWith: 'reject'}
                ]).then(async (res) => {
                    window.isNegotiatingBuyout = false;
                    if (res === 'accept') {
                        let players = [...roomState.players];
                        players.find(p=>p.uid===buyer.uid).money -= offer.price;
                        players.find(p=>p.uid===currentUser.uid).money += offer.price;
                        let props = {...roomState.properties}; props[tile.id] = { owner: buyer.uid, level: getPropData(tile.id).level || 1 };
                        await update(getRoomRef(currentRoomId), { players, properties: props, 'buyoutOffer.status': 'accepted' });
                    } else {
                        await update(getRoomRef(currentRoomId), { 'buyoutOffer.status': 'rejected' });
                    }
                });
            }
        };

        const handleTradeOfferObserver = () => {
            if (roomState && roomState.tradeOffer && roomState.tradeOffer.status === 'pending' && roomState.tradeOffer.to === currentUser.uid && !window.isNegotiatingTrade) {
                window.isNegotiatingTrade = true;
                const offer = roomState.tradeOffer; const seller = roomState.players.find(p => p.uid === offer.from);
                const tile = MAP_TILES.find(t => t.id === parseInt(offer.tileId));
                
                showModal("🤝 收到緊急拋售邀請", `<div class="text-center"><p>${seller.name} 破產變賣，出價 <b>$${offer.price}</b> 出售【${tile.name}】</p></div>`, [
                    {text: '接受', style: 'bg-emerald-600', resolveWith: 'accept'}, {text: '拒絕', style: 'bg-red-500', resolveWith: 'reject'}
                ]).then(async (res) => {
                    window.isNegotiatingTrade = false;
                    if (res === 'accept') {
                        let players = [...roomState.players];
                        let buyerIdx = players.findIndex(p=>p.uid===currentUser.uid);
                        let sellerIdx = players.findIndex(p=>p.uid===seller.uid);
                        if(players[buyerIdx].money >= offer.price) {
                            players[buyerIdx].money -= offer.price;
                            players[sellerIdx].money += offer.price;
                            let props = {...roomState.properties}; props[tile.id] = { owner: currentUser.uid, level: getPropData(tile.id).level || 1 };
                            await update(getRoomRef(currentRoomId), { players, properties: props, 'tradeOffer.status': 'accepted' });
                        } else {
                            alert("資金不足");
                            await update(getRoomRef(currentRoomId), { 'tradeOffer.status': 'rejected' });
                        }
                    } else {
                        await update(getRoomRef(currentRoomId), { 'tradeOffer.status': 'rejected' });
                    }
                });
            }
        };

        const triggerBAFSQuestion = () => {
            return new Promise((resolve) => {
                const q = BAFS_QUESTIONS[Math.floor(Math.random() * BAFS_QUESTIONS.length)];
                let html = `<div class="text-red-600 font-bold mb-2">⏳ 剩餘時間: <span id="bafs-timer">15</span>秒</div><p class="font-black text-lg mb-4 text-slate-800">${q.q}</p><div class="space-y-3">`;
                q.options.forEach((opt, i) => { html += `<button class="w-full text-left p-3 border-2 rounded-xl hover:bg-blue-50 font-bold text-slate-700 bafs-ans-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${opt}</button>`; });
                html += `</div>`;
                
                showModal(`🧠 知識挑戰`, html, []);
                
                let timeLeft = 15; let timerEl = document.getElementById('bafs-timer');
                let interval = setInterval(() => {
                    timeLeft--; if(timerEl) timerEl.innerText = timeLeft;
                    if (timeLeft <= 0) { clearInterval(interval); document.getElementById('global-modal').classList.add('hidden'); resolve(false); }
                }, 1000);

                document.getElementById('modal-body').querySelectorAll('.bafs-ans-btn').forEach(btn => {
                    btn.onclick = () => { clearInterval(interval); document.getElementById('global-modal').classList.add('hidden'); resolve(parseInt(btn.getAttribute('data-idx')) === q.ans); };
                });
            });
        };

        window.onload = initFirebase;
    </script>
</body>
</html>
